<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OsteoSpeak - Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #008080; --gold: #d4af37; --bg: #fdfdfd; --text: #2c3e50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f4f6f7; margin: 0; font-family: 'Montserrat', sans-serif; color: var(--text); }
        
        .app-container { background: var(--bg); width: 100vw; min-height: 100vh; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        /* HEADER LOGO OSTEOSPEAK */
        .header { padding: 30px 20px; text-align: center; background: white; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--primary); margin: 0; letter-spacing: -1px; }
        .logo span { color: var(--gold); }

        .scena { display: none; padding: 25px; flex: 1; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* DASHBOARD */
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .stat-card b { display: block; font-size: 1.8rem; color: var(--primary); }
        .stat-card span { font-size: 0.7rem; font-weight: 800; color: #aaa; text-transform: uppercase; }

        /* QR AREA PREMIUM */
        .qr-section { background: white; border-radius: 25px; padding: 30px; text-align: center; border: 1px solid #eee; margin-bottom: 25px; }
        #qrcode { display: inline-block; padding: 15px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* IL REGALO (ESTETICA CONGELATA) */
        .pacco-box { position: relative; width: 140px; height: 140px; margin: 40px auto 15px; }
        .fiocco-oro { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); width: 75px; height: 40px; background: var(--gold); border-radius: 40px 40px 0 0; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .pacco-teal { width: 100%; height: 100%; background: var(--primary); border-radius: 18px; position: relative; overflow: hidden; box-shadow: 0 10px 25px rgba(0,128,128,0.2); }
        .ribbon-v { position: absolute; left: 42%; width: 16%; height: 100%; background: var(--gold); }
        .ribbon-h { position: absolute; top: 42%; width: 100%; height: 16%; background: var(--gold); }

        /* BANNER RETTANGOLARE DORATO */
        .banner-sconto { 
            background: var(--gold); color: white; padding: 18px 15px; 
            border-radius: 12px; margin: 25px auto; width: 95%;
            font-weight: 800; font-size: 1.1rem; text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
            display: flex; align-items: center; justify-content: center; min-height: 70px;
        }

        /* LISTA PAZIENTI */
        .p-item { background: white; padding: 18px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; border: 1px solid #f0f0f0; align-items: center; }
        .badge { padding: 8px 15px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; border: none; cursor: pointer; }
        .badge-wait { background: #fff8e1; color: #b78d00; }
        .badge-done { background: #e8f5e9; color: #2e7d32; }

        /* BOTTONI */
        .btn-gold { background: var(--gold); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-teal { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; box-shadow: 0 8px 15px rgba(0,128,128,0.2); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 class="logo">Osteo<span>Speak</span></h1>
    </div>

    <div id="scena-setup" class="scena">
        <h2 style="text-align:center; font-family:'Playfair Display';">Benvenuto Dottore</h2>
        <input type="text" id="in-n" placeholder="Nome e Cognome">
        <input type="text" id="in-s" placeholder="Indirizzo dello Studio">
        <input type="tel" id="in-w" placeholder="WhatsApp (es. 39333...)">
        <button class="btn-teal" style="margin-top:20px;" onclick="saveUser()">ATTIVA STUDIO</button>
    </div>

    <div id="scena-dash" class="scena">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <span style="font-weight:700;">Dr. <span id="dash-dr" style="color:var(--primary)">...</span></span>
            <i class="fas fa-cog" style="color:#ddd" onclick="if(confirm('Vuoi resettare i dati?')){localStorage.clear();location.reload();}"></i>
        </div>

        <div class="stat-row">
            <div class="stat-card"><b id="stat-p">0</b><span>Pazienti</span></div>
            <div class="stat-card"><b id="stat-r">0</b><span>Referrals</span></div>
        </div>

        <div class="qr-section">
            <div id="qrcode"></div>
            <p style="font-size:0.7rem; font-weight:800; color:#bbb; margin:15px 0 10px;">CONFIGURA REGALO</p>
            <select id="sel-svc" onchange="upQR()">
                <option value="Sconto 10€">Sconto 10€ (Prima Visita)</option>
                <option value="Linfodrenaggio -25%">Linfodrenaggio -25%</option>
                <option value="Massaggio Sportivo -25%">Massaggio Sportivo -25%</option>
                <option value="Analisi Posturale -25%">Analisi Posturale -25%</option>
            </select>
        </div>

        <button class="btn-teal" onclick="addPaz()">AGGIUNGI PAZIENTE +</button>
        <div id="lista" style="margin-top:25px;"></div>
    </div>

    <div id="scena-gift" class="scena">
        <div style="text-align:center;">
            <h2 id="g-dr" style="font-family:'Playfair Display', serif; color:var(--primary); font-size:1.8rem; margin-bottom:5px;">Dr. Luca Ginevri</h2>
            <p style="font-size:0.7rem; color:#aaa; letter-spacing:1px;">TI HA INVIATO UN PENSIERO SPECIALE</p>
            
            <div class="pacco-box">
                <div class="fiocco-oro"></div>
                <div class="pacco-teal"><div class="ribbon-v"></div><div class="ribbon-h"></div></div>
            </div>

            <div class="banner-sconto" id="g-svc">SCONTO 10€</div>
            
            <button class="btn-teal" onclick="goWA()"><i class="fab fa-whatsapp"></i> RISCATTA ORA</button>
            <p id="g-loc" style="font-size:0.8rem; color:#888; margin-top:25px; font-weight:600;"></p>
        </div>
    </div>
</div>

<script>
    // URL DEL TUO SCRIPT GOOGLE (A=ID, B=Nome, C=Stato, D=Servizio, E=Amici, F=Data)
    const API = "https://script.google.com/macros/s/AKfycbwuz5TOWtqUrjQi6AwV_hW8f2wNv5ljZsekftWjSJMxmyYWqY6zGen8jM6B_3OM8RZT/exec";
    
    let user = JSON.parse(localStorage.getItem('ost_user')) || null;
    let elenco = JSON.parse(localStorage.getItem('ost_list')) || [];
    let curID = "INVITO";

    window.onload = () => {
        const p = new URLSearchParams(window.location.search);
        if(p.get('v')=='gift') { mostra('gift'); fillGift(p); }
        else if(!user) mostra('setup');
        else { mostra('dash'); initDash(); }
    };

    function mostra(id) { document.querySelectorAll('.scena').forEach(s => s.classList.remove('active')); document.getElementById('scena-'+id).classList.add('active'); }

    function saveUser() {
        user = { n: document.getElementById('in-n').value, s: document.getElementById('in-s').value, w: document.getElementById('in-w').value };
        if(!user.n || !user.w) return alert("Inserisci Nome e WhatsApp");
        localStorage.setItem('ost_user', JSON.stringify(user));
        location.reload();
    }

    function initDash() {
        document.getElementById('dash-dr').innerText = user.n;
        upQR(); render();
    }

    function upQR() {
        const svc = document.getElementById('sel-svc').value;
        const link = window.location.origin + window.location.pathname + "?v=gift&id=" + curID + "&svc=" + encodeURIComponent(svc) + "&dr=" + encodeURIComponent(user.n) + "&wa=" + user.w + "&loc=" + encodeURIComponent(user.s);
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: link, width: 160, height: 160, colorDark: "#008080" });
    }

    function addPaz() {
        if(elenco.length >= 5) return alert("Limite Free raggiunto");
        const nome = prompt("Nome Paziente:"); if(!nome) return;
        const id = nome.substring(0,3).toUpperCase() + Math.floor(1000+Math.random()*9000);
        const p = { id: id, nome: nome, stato: 'ATTESA', svc: document.getElementById('sel-svc').value, ref: 0, data: new Date().toLocaleDateString() };
        elenco.push(p);
        sync(p);
    }

    function render() {
        const d = document.getElementById('lista'); d.innerHTML = "";
        let rTot = 0;
        elenco.forEach((p, i) => {
            rTot += p.ref;
            d.innerHTML += `<div class="p-item">
                <div onclick="curID='${p.id}'; upQR(); alert('QR aggiornato per ${p.nome}');">
                    <b style="font-size:0.95rem">${p.nome}</b><br><small style="color:#aaa">ID: ${p.id} • Amici: ${p.ref}</small>
                </div>
                <div style="text-align:right">
                    <button class="badge ${p.stato=='ATTESA'?'badge-wait':'badge-done'}" onclick="toggle(${i})">${p.stato}</button><br>
                    <small onclick="addRef(${i})" style="color:var(--primary); cursor:pointer; font-size:0.6rem; font-weight:800;">+1 AMICO</small>
                </div>
            </div>`;
        });
        document.getElementById('stat-p').innerText = elenco.length;
        document.getElementById('stat-r').innerText = rTot;
    }

    function addRef(i) { elenco[i].ref++; sync(elenco[i]); }
    function toggle(i) { elenco[i].stato = (elenco[i].stato == 'ATTESA') ? 'USATO' : 'ATTESA'; sync(elenco[i]); }

    function sync(p) {
        localStorage.setItem('ost_list', JSON.stringify(elenco));
        render();
        fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(p) });
    }

    function fillGift(p) {
        document.getElementById('g-dr').innerText = p.get('dr');
        document.getElementById('g-svc').innerText = p.get('svc');
        document.getElementById('g-loc').innerText = p.get('loc');
    }

    function goWA() {
        const p = new URLSearchParams(window.location.search);
        const m = encodeURIComponent("Ciao! Ho ricevuto il regalo " + p.get('svc') + ". Invitato da ID: " + p.get('id'));
        window.open("https://wa.me/" + p.get('wa') + "?text=" + m);
    }
</script>
</body>
</html>
