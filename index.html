<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Business System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* ==============================================
           1. DESIGN SYSTEM E VARIABILI
           ============================================== */
        :root { 
            --primary: #008080; /* Teal SPICH */
            --gold: #d4af37; 
            --bg: #fdfdfd; 
            --danger: #e74c3c; 
            --success: #2ecc71; 
            --wa: #25D366; 
            --light-blue: #E1F5FE;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.06);
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            background: #f4f7f8; 
            font-family: 'Montserrat', sans-serif; 
            color: #2c3e50; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        .app-container { 
            background: var(--bg); 
            width: 100%; 
            min-height: 100vh; 
            max-width: 480px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 40px rgba(0,0,0,0.1); 
            position: relative;
        }
        
        /* HEADER FISSO - LOGO PIÙ GRANDE */
        .header { 
            padding: 25px 20px; 
            text-align: center; 
            background: white; 
            border-bottom: 1px solid #eee; 
            cursor: pointer; 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo { 
            font-family: 'Comfortaa', cursive; 
            font-size: 2.8rem; /* Ingrandito */
            color: var(--primary); 
            letter-spacing: -2px;
        }
        
        .logo span { color: var(--gold); }
        
        /* GESTIONE PANNELLI */
        .scena { 
            display: none; 
            padding: 20px; 
            animation: slideUp 0.4s ease-out; 
            flex: 1;
        }
        
        .active { display: block !important; }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* ==============================================
           2. STILI DASHBOARD
           ============================================== */
        .stat-card { 
            background: white; 
            padding: 35px 20px; 
            border-radius: 28px; 
            text-align: center; 
            border-bottom: 6px solid var(--gold); 
            margin-bottom: 25px; 
            position: relative; 
            box-shadow: var(--shadow-soft); 
        }
        
        .stat-card b { 
            font-size: 3.5rem; 
            color: var(--primary); 
            display: block; 
            line-height: 1;
            margin-bottom: 5px;
        }
        
        .stat-card span {
            font-weight: 800;
            color: #a0aec0;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
        }

        .badge-pro { 
            background: #cbd5e0; 
            color: white; 
            padding: 6px 14px; 
            border-radius: 10px; 
            font-size: 0.7rem; 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            font-weight: 800; 
        }
        
        .badge-pro.is-pro { 
            background: var(--success); 
        }
        
        /* FORM E INPUTS */
        .form-box { 
            background: white; 
            padding: 25px; 
            border-radius: 24px; 
            border: 1px solid #f0f0f0; 
            margin-bottom: 25px; 
        }
        
        label { 
            font-size: 0.7rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 18px 0 6px 4px; 
            display: block; 
        }
        
        input, select { 
            width: 100%; 
            padding: 16px; 
            border-radius: 15px; 
            border: 1px solid #e2e8f0; 
            font-family: inherit; 
            font-size: 1rem; 
            outline: none; 
            background: #fbfbfb;
        }
        
        .btn-teal { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 18px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            font-size: 1.1rem; 
            margin-top: 20px;
            box-shadow: 0 6px 18px rgba(0,128,128,0.2);
        }

        /* LISTA ITEM */
        .p-item { 
            background: white; 
            padding: 20px; 
            border-radius: 22px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #f1f5f9; 
        }
        
        .btn-wa { 
            background: var(--wa); 
            color: white; 
            width: 52px; 
            height: 52px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
            font-size: 1.7rem; 
            margin-right: 12px; 
        }
        
        .btn-ref { 
            background: var(--gold); 
            border: none; 
            padding: 14px 22px; 
            border-radius: 15px; 
            color: white; 
            font-weight: 800; 
            cursor: pointer; 
        }
        
        .btn-del { 
            color: #cbd5e0; 
            background: none; 
            border: none; 
            font-size: 1.2rem; 
            margin-right: 15px; 
            cursor: pointer; 
            display: none; 
        }
        
        /* AREA REGALO */
        .gift-wrapper { text-align: center; padding: 15px 0; }

        .gift-icon { 
            font-size: 6rem; 
            color: var(--primary); 
            margin-bottom: 25px; 
            animation: bounce-gift 2.5s infinite ease-in-out; 
            display: inline-block;
        }
        
        @keyframes bounce-gift { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-20px); } 
        }
        
        .dots-row { 
            display: flex; 
            justify-content: center; 
            gap: 16px; 
            margin: 35px 0; 
        }
        
        .dot { 
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
            border: 2px solid #e2e8f0; 
            background: #f8fafc; 
        }
        
        .dot.fill { 
            background: var(--primary); 
            border-color: var(--primary); 
            transform: scale(1.3); 
        }
        
        /* FOOTER PIÙ PICCOLO */
        .footer { 
            font-size: 0.6rem; /* Ridotto */
            color: #94a3b8; 
            text-align: center; 
            padding: 30px 20px; 
            margin-top: auto; 
            line-height: 1.5;
            letter-spacing: 0.3px;
        }

        #qrcode img { margin: 0 auto; border: 12px solid white; border-radius: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <header class="header" onclick="confermaResetApp()">
        <h1 class="logo">SPICH<span>.</span></h1>
    </header>

    <main id="scena-setup" class="scena">
        <div style="text-align:center; margin-bottom:30px;">
            <h3 style="color:var(--primary); font-weight:800;">Configura SPICH.</h3>
        </div>
        <div class="form-box">
            <label>Nome Attività</label>
            <input type="text" id="set-nome-att" placeholder="Esempio: Studio Medico Bianchi">
            <label>WhatsApp (es: 39347...)</label>
            <input type="tel" id="set-wa-att" placeholder="39...">
            <label>Settore</label>
            <select id="set-settore-att">
                <option value="Medica">Area Medica</option>
                <option value="Commerciale">Area Commerciale</option>
                <option value="Ristorazione">Area Ristorazione</option>
                <option value="Altro">Altro</option>
            </select>
            <button class="btn-teal" onclick="salvaConfigurazione()">ATTIVA PANNELLO</button>
        </div>
    </main>

    <main id="scena-dash" class="scena">
        <div class="stat-card">
            <div id="badge-pro-tag" class="badge-pro">FREE VERSION</div>
            <b id="main-counter">0</b>
            <span id="label-plurale-settore">CONTATTI</span>
        </div>
        <div class="form-box">
            <label id="label-singolare-settore">NOME E COGNOME</label>
            <input type="text" id="new-p-nome" placeholder="Inserisci nome...">
            <label>CELLULARE</label>
            <input type="tel" id="new-p-tel" placeholder="39...">
            <label>PREMIO</label>
            <select id="new-p-premio" onchange="checkCustomPremio()">
                <option value="Sconto 20%">Sconto 20%</option>
                <option value="Sconto 50%">Sconto 50%</option>
                <option value="Omaggio">Omaggio</option>
                <option value="CUSTOM">-- Custom (PRO) --</option>
            </select>
            <input type="text" id="new-p-custom" placeholder="Specifica premio..." style="display:none; margin-top:15px;">
            <button id="btn-aggiungi" class="btn-teal" onclick="aggiungiNuovoContatto()">SALVA</button>
            <div id="box-limite-free" style="display:none; text-align:center; margin-top:20px; color:var(--danger);">
                <p><b>LIMITE 10 RAGGIUNTO</b></p>
                <button onclick="richiestaSbloccoPro()" style="background:var(--danger); color:white; border:none; padding:10px; border-radius:10px; margin-top:10px; width:100%;">SBLOCCA PRO</button>
            </div>
        </div>
        <div id="lista-container"></div>
    </main>

    <main id="scena-regalo" class="scena">
        <div class="gift-wrapper">
            <i class="fas fa-gift gift-icon"></i>
            <h2 id="regalo-studio-nome" style="color:var(--primary); text-transform:uppercase;"></h2>
            <div class="dots-row" id="punti-pallini">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div id="area-qr"><div id="qrcode-box"></div></div>
            <div id="banner-premio-finale" style="background:var(--gold); color:white; padding:20px; border-radius:15px; margin-top:20px; font-weight:800;"></div>
            <div id="box-riscatta-premio" style="display:none; margin-top:20px;">
                <button class="btn-teal" onclick="prenotaConWhatsApp()">RISCATTA REGALO</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        SPICH. REFERRAL SYSTEM v3.0<br>
        DEVICE ID: <span id="display-id-dispositivo">GENERAZIONE...</span><br>
        &copy; 2026 TUTTI I DIRITTI RISERVATI
    </footer>
</div>

<script>
    const URL_SCRIPT_GOOGLE = "https://script.google.com/macros/s/AKfycbxN0X_dQwhqRSsAIMvNLCVDDQDUTWoZnQO85cz03f9ouZJz58gFQCqBc5rvzZBdw6y1-Q/exec";

    // 1. INIZIALIZZAZIONE ID IMMEDIATA
    let idDispositivo = localStorage.getItem('spich_id') || ('SP-' + Math.random().toString(36).substr(2, 6).toUpperCase());
    localStorage.setItem('spich_id', idDispositivo);

    // 2. FUNZIONE DI SICUREZZA GLOBALE
    window.onerror = function() { return true; }; // Impedisce blocchi totali

    document.addEventListener("DOMContentLoaded", function() {
        try {
            document.getElementById('display-id-dispositivo').innerText = idDispositivo;
            startApp();
        } catch (err) {
            console.error("Errore Avvio:", err);
            // Se tutto fallisce, mostra almeno il setup
            document.getElementById('scena-setup').classList.add('active');
        }
    });

    function startApp() {
        const urlParams = new URLSearchParams(window.location.search);
        let configLocale = JSON.parse(localStorage.getItem('spich_cfg') || "null");

        if (urlParams.get('v') === 'gift') {
            switchSchermata('regalo');
            inizializzaVistaRegalo(urlParams);
        } else if (!configLocale) {
            switchSchermata('setup');
        } else {
            switchSchermata('dash');
            avviaDashboard(configLocale);
        }
    }

    function switchSchermata(id) {
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active'));
        document.getElementById('scena-' + id).classList.add('active');
    }

    function salvaConfigurazione() {
        const n = document.getElementById('set-nome-att').value.trim();
        const w = document.getElementById('set-wa-att').value.trim();
        const s = document.getElementById('set-settore-att').value;
        if(!n || !w) return alert("Mancano dati");
        localStorage.setItem('spich_cfg', JSON.stringify({n, w, s}));
        fetch(URL_SCRIPT_GOOGLE, { method:"POST", mode:"no-cors", body: JSON.stringify({tipo:'REG_ESERCENTE', deviceId:idDispositivo, nomeAtt:n, wa:w}) });
        location.reload();
    }

    function avviaDashboard(cfg) {
        let plur = "CONTATTI";
        if(cfg.s === "Medica") plur = "PAZIENTI";
        if(cfg.s === "Ristorazione") plur = "OSPITI";
        document.getElementById('label-plurale-settore').innerText = plur;
        disegnaLista();
        // Verifica PRO silenziosa
        fetch(URL_SCRIPT_GOOGLE + "?checkPro=" + idDispositivo).then(r => r.json()).then(d => {
            if(d.isPro === "SI" || d.isPro === true) {
                document.getElementById('badge-pro-tag').innerText = "PRO VERSION";
                document.getElementById('badge-pro-tag').classList.add('is-pro');
            }
        }).catch(e => {});
    }

    function aggiungiNuovoContatto() {
        let list = JSON.parse(localStorage.getItem('spich_list') || "[]");
        const n = document.getElementById('new-p-nome').value.trim();
        const t = document.getElementById('new-p-tel').value.trim();
        const p = document.getElementById('new-p-premio').value;
        if(!n || !t) return alert("Compila i campi");

        const nuovo = { id:'R'+Date.now(), nome:n, tel:t, premio:p, ref:0 };
        list.push(nuovo);
        localStorage.setItem('spich_list', JSON.stringify(list));
        disegnaLista();
        document.getElementById('new-p-nome').value = ""; document.getElementById('new-p-tel').value = "";
    }

    function disegnaLista() {
        let list = JSON.parse(localStorage.getItem('spich_list') || "[]");
        const cont = document.getElementById('lista-container');
        cont.innerHTML = "";
        list.forEach((item, i) => {
            cont.innerHTML += `
            <div class="p-item">
                <div style="flex:1"><b>${item.nome}</b><br><small>${item.ref}/5 Punti</small></div>
                <div style="display:flex">
                    <a class="btn-wa" href="${generaLinkWA(item)}" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <button class="btn-ref" onclick="aggiungiPunto(${i})">+1</button>
                </div>
            </div>`;
        });
        document.getElementById('main-counter').innerText = list.length;
    }

    function generaLinkWA(item) {
        const cfg = JSON.parse(localStorage.getItem('spich_cfg'));
        const base = window.location.href.split('?')[0];
        const link = `${base}?v=gift&st=${encodeURIComponent(cfg.n)}&wa=${cfg.w}&n=${encodeURIComponent(item.nome)}&ref=${item.ref}&pr=${encodeURIComponent(item.premio)}`;
        return `https://wa.me/${item.tel}?text=${encodeURIComponent("Ciao " + item.nome + ", ecco il tuo pass: " + link)}`;
    }

    function aggiungiPunto(i) {
        let list = JSON.parse(localStorage.getItem('spich_list'));
        list[i].ref++;
        localStorage.setItem('spich_list', JSON.stringify(list));
        disegnaLista();
    }

    function inizializzaVistaRegalo(p) {
        document.getElementById('regalo-studio-nome').innerText = p.get('st');
        const ref = parseInt(p.get('ref') || 0);
        const dots = document.querySelectorAll('.dot');
        for(let i=0; i<ref && i<5; i++) dots[i].classList.add('fill');
        
        if(ref >= 5) {
            document.getElementById('area-qr').style.display = "none";
            document.getElementById('banner-premio-finale').innerText = "REGALO SBLOCCATO: " + p.get('pr');
            document.getElementById('box-riscatta-premio').style.display = "block";
        } else {
            document.getElementById('banner-premio-finale').innerText = "OBIETTIVO: " + p.get('pr');
            try {
                setTimeout(() => { new QRCode(document.getElementById("qrcode-box"), { text: window.location.href, width: 180, height: 180 }); }, 500);
            } catch(e) {}
        }
    }

    function confermaResetApp() {
        if(confirm("Disconnettere profilo?")) { localStorage.removeItem('spich_cfg'); location.reload(); }
    }
</script>
</body>
    </html>
