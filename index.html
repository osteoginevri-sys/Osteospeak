<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH - Referral Pass</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #008080; --gold: #d4af37; --bg: #fdfdfd; --gray: #e8e8e8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f4f6f7; margin: 0; font-family: 'Montserrat', sans-serif; color: #2c3e50; }
        .app-container { background: var(--bg); width: 100vw; min-height: 100vh; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        /* HEADER */
        .header { padding: 20px; text-align: center; background: white; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Comfortaa', cursive; font-size: 2.2rem; color: var(--primary); margin: 0; letter-spacing: -1px; }
        .logo span { color: var(--gold); }

        .scena { display: none; padding: 20px; flex: 1; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* DASHBOARD TITOLARE */
        .stat-card { background: white; padding: 18px; border-radius: 18px; text-align: center; border-bottom: 5px solid var(--gold); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card b { font-size: 2rem; color: var(--primary); display: block; }
        .p-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .p-info b { color: var(--primary); font-size: 1rem; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 10px; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; margin-right: 10px; font-size: 1.1rem; }

        /* IL PACCO REGALO & FIOCCO */
        .gift-box-container { position: relative; width: 100px; height: 100px; margin: 50px auto 20px; }
        .fiocco-wrap { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 70px; height: 30px; z-index: 10; }
        .asola { position: absolute; width: 35px; height: 25px; border: 6px solid var(--gold); border-radius: 50% 50% 0 50%; transform: rotate(-10deg); left: 0; }
        .asola.right { border-radius: 50% 50% 50% 0%; transform: rotate(10deg); left: auto; right: 0; }
        .nodo { position: absolute; left: 50%; top: 15px; transform: translateX(-50%); width: 14px; height: 14px; background: var(--gold); border-radius: 4px; z-index: 11; }
        .pacco { width: 100%; height: 100%; background: var(--primary); border-radius: 10px; position: relative; overflow: hidden; }
        .nastro-v { position: absolute; left: 42%; width: 16%; height: 100%; background: var(--gold); }
        .nastro-h { position: absolute; top: 42%; width: 100%; height: 16%; background: var(--gold); }

        /* BARRA 5 CERCHI */
        .progresso-container { display: flex; justify-content: center; gap: 12px; margin: 30px 0; }
        .cerchio { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--gray); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #ccc; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cerchio.attivo { border-color: var(--gold); background: var(--gold); color: white; transform: scale(1.1); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }

        /* UTILITY */
        .banner-oro { background: var(--gold); color: white; padding: 18px; border-radius: 12px; margin: 25px auto; width: 90%; font-weight: 800; text-transform: uppercase; text-align: center; font-size: 1rem; }
        .btn-teal { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1.1rem; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; }
        #qrcode { background: white; padding: 12px; display: inline-block; border: 1px solid #eee; border-radius: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1 class="logo">SPICH<span>.</span></h1></div>

    <div id="scena-setup" class="scena">
        <h2 style="text-align:center; font-family:'Comfortaa'; color:var(--primary);">Benvenuto su SPICH</h2>
        <p style="text-align:center; font-size:0.9rem; color:#666; margin-bottom:20px;">Configura la tua attività per iniziare.</p>
        <input type="text" id="set-att" placeholder="Nome Attività (es. Studio Rossi)">
        <input type="text" id="set-ind" placeholder="Città / Indirizzo Studio">
        <input type="tel" id="set-wa" placeholder="WhatsApp Studio (es. 39333...)">
        <button class="btn-teal" style="margin-top:20px;" onclick="salvaSetup()">CONFIGURA ORA</button>
    </div>

    <div id="scena-dash" class="scena">
        <div class="stat-card"><b id="count-r">0</b><span>Referral Totali Generati</span></div>
        <button class="btn-teal" onclick="nuovoCliente()"><i class="fas fa-plus"></i> NUOVO CLIENTE</button>
        <div id="lista-clienti" style="margin-top:25px;"></div>
    </div>

    <div id="scena-regalo" class="scena">
        <div style="text-align:center;">
            <h2 id="reg-att" style="font-family:'Comfortaa'; color:var(--primary); margin-bottom:5px;">Attività</h2>
            <p style="font-size:0.75rem; letter-spacing:1px; color:#999; text-transform:uppercase;">GIFT PASS DI: <b id="reg-cliente" style="color:var(--gold)">...</b></p>
            
            <div class="gift-box-container">
                <div class="fiocco-wrap"><div class="asola"></div><div class="nodo"></div><div class="asola right"></div></div>
                <div class="pacco"><div class="nastro-v"></div><div class="nastro-h"></div></div>
            </div>

            <div class="progresso-container" id="barra-cerchi"></div>
            <p id="msg-stato" style="font-weight:800; font-size:1rem; min-height:1.2em;"></p>

            <div id="qrcode"></div>
            <div class="banner-oro">REGALO PRONTO PER TE</div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx02Oy6cTdzojhljINp0nEk9nlHFMOthVnRUztVJqe8srVDcBs8oSsbqySpzywVV1K_/exec";
    let config = JSON.parse(localStorage.getItem('spich_cfg')) || null;
    let clienti = JSON.parse(localStorage.getItem('spich_cli')) || [];

    window.onload = () => {
        const p = new URLSearchParams(window.location.search);
        if (p.get('v') === 'gift') {
            mostra('regalo');
            initCliente(p);
        } else if (!config) {
            mostra('setup');
        } else {
            mostra('dash');
            renderDash();
        }
    };

    function mostra(id) { 
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active')); 
        document.getElementById('scena-' + id).classList.add('active'); 
    }

    function salvaSetup() {
        const att = document.getElementById('set-att').value;
        const wa = document.getElementById('set-wa').value;
        const ind = document.getElementById('set-ind').value;
        if(!att || !wa) return alert("Inserisci Nome Attività e WhatsApp");
        config = { n: att, w: wa, i: ind };
        localStorage.setItem('spich_cfg', JSON.stringify(config));
        location.reload();
    }

    function nuovoCliente() {
        const nome = prompt("Nome del nuovo cliente:");
        if(!nome) return;
        const id = "SP" + Math.floor(1000 + Math.random() * 9000);
        const nuovo = { id: id, nome: nome, ref: 0, waStudio: config.w, att: config.n, ind: config.i, data: new Date().toLocaleDateString() };
        clienti.push(nuovo);
        sync(nuovo);
    }

    function renderDash() {
        const cont = document.getElementById('lista-clienti');
        cont.innerHTML = "";
        let tot = 0;
        clienti.forEach((c, i) => {
            tot += c.ref;
            cont.innerHTML += `
                <div class="p-item">
                    <div class="p-info"><b>${c.nome}</b><br><small style="color:#aaa">${c.ref}/5 Amici • ID: ${c.id}</small></div>
                    <div style="display:flex; align-items:center;">
                        <button class="btn-wa" onclick="inviaWA(${i})"><i class="fab fa-whatsapp"></i></button>
                        <button onclick="addRef(${i})" style="background:var(--gold); color:white; border:none; padding:10px 15px; border-radius:10px; font-weight:800; cursor:pointer;">+1</button>
                    </div>
                </div>`;
        });
        document.getElementById('count-r').innerText = tot;
    }

    function addRef(i) {
        if(clienti[i].ref < 5) {
            clienti[i].ref++;
            sync(clienti[i]);
        }
    }

    function inviaWA(i) {
        const c = clienti[i];
        const link = window.location.origin + window.location.pathname + "?v=gift&id=" + c.id + "&paz=" + encodeURIComponent(c.nome) + "&dr=" + encodeURIComponent(config.n) + "&wa=" + config.w + "&ref=" + c.ref;
        const msg = encodeURIComponent("Ciao " + c.nome + "! Ecco il tuo SPICH PASS per " + config.n + ": " + link + " . Ogni 5 amici che porti, ricevi un regalo speciale da parte nostra!");
        window.open("https://wa.me/?text=" + msg);
    }

    function initCliente(p) {
        document.getElementById('reg-att').innerText = p.get('dr');
        document.getElementById('reg-cliente').innerText = p.get('paz');
        const r = parseInt(p.get('ref')) || 0;
        const barra = document.getElementById('barra-cerchi');
        barra.innerHTML = "";
        
        for(let i=1; i<=5; i++) {
            const attivo = i <= r ? 'attivo' : '';
            const icona = i <= r ? '<i class="fas fa-star"></i>' : i;
            barra.innerHTML += `<div class="cerchio ${attivo}">${icona}</div>`;
        }

        const ms = document.getElementById('msg-stato');
        if(r < 5) {
            ms.innerText = "Ti mancano " + (5 - r) + " bollini!";
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 160, height: 160, colorDark: "#008080" });
        } else {
            ms.innerHTML = "<span style='color:var(--gold)'>PREMIO SBLOCCATO! 🎉</span>";
            document.getElementById('qrcode').innerHTML = "<i class='fas fa-gift' style='font-size:80px; color:var(--gold); padding:20px;'></i>";
        }
    }

    function sync(c) {
        localStorage.setItem('spich_cli', JSON.stringify(clienti));
        renderDash();
        fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(c) });
    }
</script>
</body>
</html>
