<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OsteoSpeak Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #008080; --gold: #d4af37; --bg: #fdfdfd; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f0f2f5; margin: 0; font-family: 'Montserrat', sans-serif; }
        .app-container { background: var(--bg); width: 100vw; min-height: 100vh; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        .header { padding: 25px 20px; text-align: center; background: white; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--primary); margin: 0; }
        .logo span { color: var(--gold); }

        .scena { display: none; padding: 20px; flex: 1; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* REGALO CON BANNER RETTANGOLARE */
        .gift-area { text-align: center; padding: 10px; }
        .pacco-container { position: relative; width: 130px; height: 130px; margin: 40px auto 10px; }
        .fiocco { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 70px; height: 35px; background: var(--gold); border-radius: 40px 40px 0 0; z-index: 5; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .pacco-corpo { width: 100%; height: 100%; background: var(--primary); border-radius: 15px; position: relative; overflow: hidden; }
        .nastro-v { position: absolute; left: 42%; width: 16%; height: 100%; background: var(--gold); }
        .nastro-h { position: absolute; top: 42%; width: 100%; height: 16%; background: var(--gold); }

        .banner-oro { 
            background: var(--gold); color: white; padding: 15px; 
            border-radius: 12px; margin: 25px auto; width: 90%;
            font-weight: 800; font-size: 1.1rem; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            display: flex; align-items: center; justify-content: center; min-height: 60px;
        }

        /* DASHBOARD */
        .qr-box { background: white; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #eee; margin-bottom: 20px; }
        #qrcode { display: inline-block; padding: 10px; background: white; }
        .p-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; border: 1px solid #eee; align-items: center; }
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; cursor: pointer; border: none; }
        .badge-wait { background: #fff4d1; color: #856404; }
        .badge-done { background: #d4edda; color: #155724; }

        .btn-primary { background: var(--primary); color: white; width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 1rem; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1 class="logo">Osteo<span>Speak</span></h1></div>

    <div id="scena-setup" class="scena">
        <h2 style="text-align:center;">Configura Studio</h2>
        <input type="text" id="s-nome" placeholder="Nome Dottore">
        <input type="text" id="s-studio" placeholder="Indirizzo Studio">
        <input type="tel" id="s-wa" placeholder="WhatsApp (es. 39333...)">
        <button class="btn-primary" onclick="configura()">ATTIVA ACCOUNT</button>
    </div>

    <div id="scena-dash" class="scena">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b id="benvenuto">Dr.</b>
            <i class="fas fa-trash" onclick="if(confirm('Reset?')){localStorage.clear();location.reload();}" style="color:#eee"></i>
        </div>
        <div class="qr-box">
            <div id="qrcode"></div>
            <select id="sel-svc" onchange="generaQR()">
                <option value="Sconto 10€">Sconto 10€ (Prima Visita)</option>
                <option value="Linfodrenaggio -25%">Linfodrenaggio -25%</option>
                <option value="Massaggio Sportivo -25%">Massaggio Sportivo -25%</option>
                <option value="Analisi Posturale -25%">Analisi Posturale -25%</option>
            </select>
        </div>
        <button class="btn-primary" onclick="nuovoPaz()">AGGIUNGI PAZIENTE +</button>
        <div id="lista" style="margin-top:20px;"></div>
    </div>

    <div id="scena-regalo" class="scena">
        <div class="gift-area">
            <h2 id="r-dr" style="font-family:'Playfair Display', serif; color:var(--primary); margin:0;">Dr. Luca Ginevri</h2>
            <p style="font-size:0.7rem; color:#999; letter-spacing:1px; margin-top:5px;">TI HA INVIATO UN REGALO</p>
            <div class="pacco-container">
                <div class="fiocco"></div>
                <div class="pacco-corpo"><div class="nastro-v"></div><div class="nastro-h"></div></div>
            </div>
            <div class="banner-oro" id="r-svc">SCONTO 10€</div>
            <button class="btn-primary" onclick="prenota()"><i class="fab fa-whatsapp"></i> PRENOTA IL TUO REGALO</button>
            <p id="r-loc" style="font-size:0.8rem; color:#888; margin-top:20px;"></p>
        </div>
    </div>
</div>
