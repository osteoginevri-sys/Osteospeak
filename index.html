<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OsteoSpeak - Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #008080; --gold: #d4af37; --bg: #fdfdfd; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f4f6f7; margin: 0; font-family: 'Montserrat', sans-serif; color: #2c3e50; }
        
        .app-container { background: var(--bg); width: 100vw; min-height: 100vh; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        /* HEADER */
        .header { padding: 25px 20px; text-align: center; background: white; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Comfortaa', cursive; font-size: 2rem; color: var(--primary); margin: 0; }
        .logo span { color: var(--gold); }

        .scena { display: none; padding: 20px; flex: 1; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* DASHBOARD STATS */
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .stat-card b { display: block; font-size: 1.5rem; color: var(--primary); }
        .stat-card span { font-size: 0.6rem; font-weight: 800; color: #aaa; text-transform: uppercase; }

        /* QR AREA */
        .qr-section { background: white; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #eee; margin-bottom: 20px; }
        #qrcode { display: inline-block; padding: 10px; background: white; border: 1px solid #f0f0f0; border-radius: 10px; }
        .qr-label { font-size: 0.7rem; font-weight: 800; color: var(--gold); margin-top: 10px; text-transform: uppercase; }

        /* IL REGALO (BANNER RETTANGOLARE) */
        .pacco-box { position: relative; width: 120px; height: 120px; margin: 35px auto 10px; }
        .fiocco { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 60px; height: 30px; background: var(--gold); border-radius: 30px 30px 0 0; z-index: 5; }
        .pacco-corpo { width: 100%; height: 100%; background: var(--primary); border-radius: 12px; position: relative; overflow: hidden; }
        .nastro-v { position: absolute; left: 42%; width: 16%; height: 100%; background: var(--gold); }
        .nastro-h { position: absolute; top: 42%; width: 100%; height: 16%; background: var(--gold); }
        .banner-oro { background: var(--gold); color: white; padding: 15px; border-radius: 10px; margin: 20px auto; width: 90%; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        /* LISTA PAZIENTI */
        .p-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; border: 1px solid #f0f0f0; align-items: center; }
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; border: none; cursor: pointer; }
        .badge-wait { background: #fff4d1; color: #856404; }
        .badge-done { background: #d4edda; color: #155724; }

        /* BUTTONS & INPUTS */
        .btn-teal { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1 class="logo">Osteo<span>Speak</span></h1></div>

    <div id="scena-dash" class="scena">
        <div class="stat-row">
            <div class="stat-card"><b id="count-p">0</b><span>Pazienti</span></div>
            <div class="stat-card"><b id="count-r">0</b><span>Referrals</span></div>
        </div>

        <div class="qr-section">
            <div id="qrcode"></div>
            <div class="qr-label" id="qr-target">Seleziona un paziente</div>
            <select id="sel-svc" onchange="generaQR()">
                <option value="Sconto 10€">Sconto 10€ (Prima Visita)</option>
                <option value="Linfodrenaggio -25%">Linfodrenaggio -25%</option>
                <option value="Massaggio Sportivo -25%">Massaggio Sportivo -25%</option>
                <option value="Analisi Posturale -25%">Analisi Posturale -25%</option>
            </select>
        </div>

        <button class="btn-teal" onclick="addPaziente()">AGGIUNGI PAZIENTE +</button>
        <div id="lista-pazienti" style="margin-top:20px;"></div>
    </div>

    <div id="scena-regalo" class="scena">
        <div style="text-align:center;">
            <h2 id="reg-dr" style="font-family:'Comfortaa'; color:var(--primary); margin-bottom:5px;">Dr. Osteopata</h2>
            <p style="font-size:0.7rem; color:#999;">REGALO OFFERTO DA: <b id="reg-paz-nome" style="color:var(--gold)">...</b></p>
            
            <div class="pacco-box">
                <div class="fiocco"></div>
                <div class="pacco-corpo"><div class="nastro-v"></div><div class="nastro-h"></div></div>
            </div>

            <div class="banner-oro" id="reg-svc">SCONTO -25%</div>
            
            <button class="btn-teal" onclick="prenotaWA()"><i class="fab fa-whatsapp"></i> RICEVI IL REGALO</button>
            <p id="reg-loc" style="font-size:0.8rem; color:#888; margin-top:20px;"></p>
        </div>
    </div>

    <div id="scena-setup" class="scena">
        <h2 style="text-align:center; font-family:'Comfortaa'; color:var(--primary);">Configura Studio</h2>
        <input type="text" id="set-n" placeholder="Tuo Nome (es. Dr. Luca)">
        <input type="text" id="set-s" placeholder="Indirizzo Studio">
        <input type="tel" id="set-w" placeholder="WhatsApp (es. 39333...)">
        <button class="btn-teal" style="margin-top:15px;" onclick="saveSetup()">ATTIVA DASHBOARD</button>
    </div>
</div>

<script>
    // URL SCRIPT GOOGLE
    const API_URL = "https://script.google.com/macros/s/AKfycbx02Oy6cTdzojhljINp0nEk9nlHFMOthVnRUztVJqe8srVDcBs8oSsbqySpzywVV1K_/exec";
    
    let dr = JSON.parse(localStorage.getItem('ost_dr')) || null;
    let list = JSON.parse(localStorage.getItem('ost_list')) || [];
    let activeP = { id: "INVITO", nome: "Nuovo Paziente" };

    window.onload = () => {
        const urlP = new URLSearchParams(window.location.search);
        if (urlP.get('v') === 'gift') {
            mostra('regalo');
            document.getElementById('reg-dr').innerText = urlP.get('dr');
            document.getElementById('reg-svc').innerText = urlP.get('svc');
            document.getElementById('reg-loc').innerText = urlP.get('loc');
            document.getElementById('reg-paz-nome').innerText = urlP.get('paz');
        } else if (!dr) {
            mostra('setup');
        } else {
            mostra('dash');
            initDash();
        }
    };

    function mostra(id) {
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active'));
        document.getElementById('scena-' + id).classList.add('active');
    }

    function saveSetup() {
        const n = document.getElementById('set-n').value;
        const w = document.getElementById('set-w').value;
        const s = document.getElementById('set-s').value;
        if(!n || !w) return alert("Inserisci Nome e WhatsApp");
        dr = { n: n, s: s, w: w };
        localStorage.setItem('ost_dr', JSON.stringify(dr));
        location.reload();
    }

    function initDash() {
        generaQR();
        renderList();
    }

    function generaQR() {
        const svc = document.getElementById('sel-svc').value;
        const link = window.location.origin + window.location.pathname + "?v=gift&id=" + activeP.id + "&paz=" + encodeURIComponent(activeP.nome) + "&svc=" + encodeURIComponent(svc) + "&dr=" + encodeURIComponent(dr.n) + "&wa=" + dr.w + "&loc=" + encodeURIComponent(dr.s);
        
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { 
            text: link, 
            width: 160, 
            height: 160, 
            colorDark: "#008080" 
        });
        document.getElementById('qr-target').innerText = "QR DI: " + activeP.nome;
    }

    function addPaziente() {
        const nome = prompt("Nome Paziente:");
        if(!nome) return;
        const id = nome.substring(0,3).toUpperCase() + Math.floor(1000 + Math.random() * 9000);
        const p = { 
            id: id, 
            nome: nome, 
            stato: 'ATTESA', 
            svc: document.getElementById('sel-svc').value, 
            ref: 0, 
            data: new Date().toLocaleDateString(),
            studioWA: dr.w 
        };
        list.push(p);
        activeP = { id: p.id, nome: p.nome };
        sync(p);
    }

    function renderList() {
        const container = document.getElementById('lista-pazienti');
        container.innerHTML = "";
        let rTot = 0;
        list.forEach((p, i) => {
            rTot += p.ref;
            container.innerHTML += `
                <div class="p-item">
                    <div onclick="setQR('${p.id}', '${p.nome}')" style="cursor:pointer; flex:1;">
                        <b>${p.nome}</b><br><small style="color:#aaa">ID: ${p.id} • Amici: ${p.ref}</small>
                    </div>
                    <div style="text-align:right">
                        <button class="badge ${p.stato=='ATTESA'?'badge-wait':'badge-done'}" onclick="toggleS(${i})">${p.stato}</button><br>
                        <small onclick="addR(${i})" style="color:var(--primary); cursor:pointer; font-weight:800; font-size:0.6rem;">+1 AMICO</small>
                    </div>
                </div>`;
        });
        document.getElementById('count-p').innerText = list.length;
        document.getElementById('count-r').innerText = rTot;
    }

    function setQR(id, nome) {
        activeP = { id: id, nome: nome };
        generaQR();
    }

    function addR(i) {
        list[i].ref++;
        sync(list[i]);
    }

    function toggleS(i) {
        list[i].stato = (list[i].stato === 'ATTESA' ? 'USATO' : 'ATTESA');
        sync(list[i]);
    }

    function sync(p) {
        localStorage.setItem('ost_list', JSON.stringify(list));
        renderList();
        fetch(API_URL, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify(p) 
        });
    }

    function prenotaWA() {
        const p = new URLSearchParams(window.location.search);
        const msg = encodeURIComponent("Ciao! Sono un amico di " + p.get('paz') + " (ID:" + p.get('id') + ") e vorrei prenotare il regalo: " + p.get('svc'));
        window.open("https://wa.me/" + p.get('wa') + "?text=" + msg);
    }
</script>
</body>
</html>
