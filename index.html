<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #008080; --gold: #d4af37; --bg: #fdfdfd; --danger: #e74c3c; --success: #2ecc71; --wa: #25D366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #f4f6f7; font-family: 'Montserrat', sans-serif; color: #2c3e50; min-height: 100vh; overflow-x: hidden; }
        .app-container { background: var(--bg); width: 100%; min-height: 100vh; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        .header { padding: 20px; text-align: center; background: white; border-bottom: 1px solid #eee; cursor: pointer; }
        .logo { font-family: 'Comfortaa', cursive; font-size: 2.2rem; color: var(--primary); }
        .logo span { color: var(--gold); }
        .scena { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active { display: block !important; }
        .stat-card { background: white; padding: 20px; border-radius: 18px; text-align: center; border-bottom: 5px solid var(--gold); margin-bottom: 20px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card b { font-size: 2.5rem; color: var(--primary); display: block; }
        .badge-pro { background: #bbb; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; position: absolute; top: 10px; right: 10px; font-weight: 800; }
        .badge-pro.is-pro { background: var(--success); }
        .form-box { background: white; padding: 15px; border-radius: 18px; border: 1px solid #eee; margin-bottom: 20px; }
        label { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-top: 10px; display: block; padding-left: 5px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 12px 0; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; outline: none; }
        .btn-teal { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; }
        .p-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; position: relative; }
        .btn-wa { background: var(--wa); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.5rem; margin-right: 5px; }
        .btn-ref { background: var(--gold); border: none; padding: 10px 15px; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; }
        .btn-del { color: var(--danger); background: none; border: none; font-size: 1.2rem; margin-right: 15px; cursor: pointer; display: none; }
        .lock-box { background: #fff5f5; border: 2px dashed var(--danger); border-radius: 15px; padding: 20px; text-align: center; display: none; }
        .btn-pro { background: var(--danger); color: white; padding: 12px; border-radius: 10px; border: none; width: 100%; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .gift-icon { font-size: 4rem; color: var(--gold); margin-bottom: 15px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .banner-oro { background: var(--gold); color: white; padding: 20px; border-radius: 15px; font-weight: 800; text-align: center; margin-top: 15px; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
        .footer { font-size: 0.6rem; color: #ccc; text-align: center; padding: 20px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header" onclick="confermaReset()"><h1 class="logo">SPICH<span>.</span></h1></div>

    <div id="scena-setup" class="scena">
        <h3 style="text-align:center; margin-bottom:15px; color:var(--primary);">Area Professionista</h3>
        <div class="form-box">
            <label>Nome Attività</label>
            <input type="text" id="set-att" placeholder="Es: Studio Medico Rossi">
            <label>Il Tuo WhatsApp Business</label>
            <input type="tel" id="set-wa" placeholder="Esempio: 39347...">
            <label>Settore di attività</label>
            <select id="set-cat">
                <option value="Medica">Settore Medico</option>
                <option value="Commerciale">Settore Commerciale</option>
                <option value="Ristorazione">Settore Ristorazione</option>
                <option value="Altro">Altro</option>
            </select>
            <button class="btn-teal" onclick="salvaSetup()">CONFIGURA ATTIVITÀ</button>
        </div>
    </div>

    <div id="scena-dash" class="scena">
        <div class="stat-card">
            <div id="badge-pro" class="badge-pro">FREE</div>
            <b id="contatore">0</b><span id="label-cat">Contatti</span>
        </div>
        <div class="form-box">
            <label id="label-nome">Nome</label>
            <input type="text" id="new-nome" placeholder="Inserisci nome...">
            <label>Cellulare</label>
            <input type="tel" id="new-tel" placeholder="39...">
            <label>Premio Referral</label>
            <select id="new-premio" onchange="checkPremio()">
                <option value="Sconto 20%">Sconto 20%</option>
                <option value="Sconto 50%">Sconto 50%</option>
                <option value="Omaggio">Trattamento Omaggio</option>
                <option value="CUSTOM">-- Scrivi premio personalizzato (PRO) --</option>
            </select>
            <input type="text" id="new-custom" placeholder="Descrizione premio..." style="display:none;">
            <button id="btn-add" class="btn-teal" onclick="aggiungiContatto()">AGGIUNGI</button>
            <div id="box-lock" class="lock-box">
                <p style="color:var(--danger); font-weight:800;">LIMITE 10 CONTATTI RAGGIUNTO</p>
                <button onclick="chiediPro()" class="btn-pro">PASSA A VERSIONE PRO</button>
            </div>
        </div>
        <div id="lista-contatti"></div>
    </div>

    <div id="scena-regalo" class="scena">
        <div style="text-align:center;">
            <i class="fas fa-gift gift-icon"></i>
            <h2 id="reg-studio" style="color:var(--primary); text-transform:uppercase;"></h2>
            <p style="margin-bottom:20px; font-weight:700;">Ha un regalo speciale per te!</p>
            <div id="qrcode" style="margin:0 auto; padding:15px; background:white; display:inline-block; border-radius:15px; border: 1px solid #eee;"></div>
            <div id="reg-premio" class="banner-oro"></div>
            <div id="box-prenota" style="display:none; margin-top:20px;">
                <p style="font-size:0.8rem; margin-bottom:15px;">Mostra questo codice o prenota ora:</p>
                <button class="btn-teal" onclick="prenotaOra()">PRENOTA SU WHATSAPP</button>
            </div>
        </div>
    </div>
    <div class="footer">Device ID: <span id="dev-id"></span></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwEXePNdjCW79f3sOoC9Mcm6R3JO6e97ziaDmqkZ3aRplK4ZGhq7X02tLz0ik8HblPq/exec";
    let deviceId = localStorage.getItem('spich_id') || ('SP' + Math.floor(Math.random()*9000));
    localStorage.setItem('spich_id', deviceId);
    let config = null; try { config = JSON.parse(localStorage.getItem('spich_cfg')); } catch(e) { config = null; }
    let contatti = []; try { contatti = JSON.parse(localStorage.getItem('spich_list')) || []; } catch(e) { contatti = []; }
    let isPro = false;

    window.onload = function() {
        document.getElementById('dev-id').innerText = deviceId;
        const p = new URLSearchParams(window.location.search);
        if (p.get('v') === 'gift') { mostraScena('regalo'); caricaRegalo(p); }
        else if (!config) { mostraScena('setup'); }
        else { mostraScena('dash'); inizializzaDash(); checkStatoPro(); }
    };

    function mostraScena(id) {
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active'));
        document.getElementById('scena-' + id).classList.add('active');
    }

    function inizializzaDash() {
        let s = "Cliente", pl = "Clienti";
        if(config.cat === "Medica") { s = "Paziente"; pl = "Pazienti"; }
        else if(config.cat === "Ristorazione") { s = "Ospite"; pl = "Ospiti"; }
        document.getElementById('label-cat').innerText = pl;
        document.getElementById('label-nome').innerText = "Nome " + s;
        renderLista();
    }

    async function checkStatoPro() {
        try {
            const r = await fetch(API_URL + "?checkPro=" + deviceId);
            const d = await r.json();
            if (d.isPro) {
                isPro = true;
                const b = document.getElementById('badge-pro');
                b.innerText = "PRO"; b.classList.add('is-pro');
                document.querySelectorAll('.btn-del').forEach(btn => btn.style.display = "block");
            }
        } catch(e) { console.log("Offline"); }
    }

    function salvaSetup() {
        const n = document.getElementById('set-att').value.trim();
        const w = document.getElementById('set-wa').value.trim();
        const c = document.getElementById('set-cat').value;
        if (!n || !w) return alert("Inserisci tutti i dati");
        config = { n, w, cat: c };
        localStorage.setItem('spich_cfg', JSON.stringify(config));
        fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({tipo:'REG_ESERCENTE', deviceId, nomeAtt: n, wa: w}) });
        location.reload();
    }

    function aggiungiContatto() {
        if (!isPro && contatti.length >= 10) return;
        const nome = document.getElementById('new-nome').value.trim();
        const tel = document.getElementById('new-tel').value.trim();
        let premio = document.getElementById('new-premio').value;
        if (premio === 'CUSTOM') premio = document.getElementById('new-custom').value;
        if (!nome || !tel) return alert("Compila i campi richiesti");

        const nuovo = { id: 'PX'+Math.floor(Math.random()*899+100), nome, tel, premio, ref: 0, owner: deviceId, att: config.n, wa: config.w };
        contatti.push(nuovo);
        salvaEInvia(nuovo);
        document.getElementById('new-nome').value = ""; document.getElementById('new-tel').value = "";
    }

    function renderLista() {
        const div = document.getElementById('lista-contatti');
        div.innerHTML = "";
        contatti.forEach((p, index) => {
            div.innerHTML += `
            <div class="p-item">
                <button class="btn-del" onclick="eliminaContatto('${p.id}', ${index})" style="display:${isPro?'block':'none'}"><i class="fas fa-trash-alt"></i></button>
                <div style="flex:1"><b>${p.nome}</b><br><small>${p.ref}/5 Amici Segnalati</small></div>
                <div style="display:flex; align-items:center;">
                    <a class="btn-wa" href="${generaLinkWA(p)}" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <button class="btn-ref" onclick="aggiungiPunto(${index})">+1</button>
                </div>
            </div>`;
        });
        document.getElementById('contatore').innerText = contatti.length;
        if (!isPro && contatti.length >= 10) { document.getElementById('btn-add').style.display='none'; document.getElementById('box-lock').style.display='block'; }
    }

    function generaLinkWA(p) {
        const base = window.location.href.split('?')[0];
        const giftUrl = `${base}?v=gift&id=${p.id}&n=${encodeURIComponent(p.nome)}&st=${encodeURIComponent(config.n)}&wa=${config.w}&pr=${encodeURIComponent(p.premio)}`;
        const msg = `Ciao ${p.nome}! Abbiamo un regalo per te da ${config.n}. Clicca qui per scoprirlo: ${giftUrl}`;
        return `https://wa.me/${p.tel}?text=${encodeURIComponent(msg)}`;
    }

    function aggiungiPunto(i) { contatti[i].ref++; salvaEInvia(contatti[i]); }

    function salvaEInvia(p) {
        localStorage.setItem('spich_list', JSON.stringify(contatti));
        renderLista();
        fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({tipo:'ADD_PAZIENTE', ...p}) });
    }

    function eliminaContatto(id, index) {
        if(confirm("Vuoi davvero eliminare questo contatto?")) {
            contatti.splice(index, 1);
            localStorage.setItem('spich_list', JSON.stringify(contatti));
            renderLista();
            fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({tipo:'DEL_PAZIENTE', id: id}) });
        }
    }

    function confermaReset() {
        if(config && confirm("Vuoi tornare alla schermata di accesso?")) { localStorage.removeItem('spich_cfg'); location.reload(); }
    }

    function chiediPro() {
        fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({tipo:'RICHIESTA_PRO', deviceId, nomeAtt: config.n, wa: config.w}) });
        alert("Richiesta inviata! Riceverai conferma a spich.admin@gmail.com.");
    }

    function caricaRegalo(params) {
        document.getElementById('reg-studio').innerText = params.get('st');
        document.getElementById('reg-premio').innerHTML = "IL TUO REGALO:<br><span>" + params.get('pr') + "</span>";
        if (window.location.hash === '#prenota') {
            document.getElementById('box-prenota').style.display = 'block';
        } else {
            const qrUrl = window.location.href + '#prenota';
            new QRCode(document.getElementById("qrcode"), { text: qrUrl, width: 170, height: 170 });
        }
    }

    function prenotaOra() {
        const p = new URLSearchParams(window.location.search);
        const msg = `Ciao! Mi ha invitato ${p.get('n')}, vorrei prenotare il mio regalo: ${p.get('pr')}`;
        window.open(`https://wa.me/${p.get('wa')}?text=${encodeURIComponent(msg)}`);
    }

    function checkPremio() {
        const sel = document.getElementById('new-premio').value;
        const cust = document.getElementById('new-custom');
        if (sel === 'CUSTOM') {
            if (!isPro) { alert("Solo per utenti PRO!"); document.getElementById('new-premio').value = "Sconto 20%"; }
            else { cust.style.display = 'block'; }
        } else { cust.style.display = 'none'; }
    }
</script>
</body>
                    </html>
