<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OsteoSpeak - Dr. Luca Ginevri</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #008080; --gold: #d4af37; --bg: #f4f7f8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; font-family: 'Montserrat', sans-serif; }
        .app-container { background: white; width: 100vw; min-height: 100vh; max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .scena { display: none; }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* DASHBOARD */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-card { border: 2px solid var(--primary); border-radius: 15px; padding: 15px; text-align: center; }
        .stat-card b { display: block; font-size: 1.5rem; color: var(--primary); }

        /* QR AREA */
        .qr-card { background: #f0f4f5; border-radius: 25px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 15px; }

        /* IL PACCO REGALO (FISSO) */
        .gift-container { position: relative; width: 140px; height: 140px; margin: 30px auto; }
        .gift-bow { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 30px; background: var(--gold); border-radius: 30px 30px 0 0; z-index: 2;
        }
        .gift-box { width: 110px; height: 110px; background: var(--primary); margin: 0 auto; border-radius: 15px; position: relative; overflow: hidden; }
        .ribbon-v { position: absolute; left: 42%; width: 16%; height: 100%; background: var(--gold); }
        .ribbon-h { position: absolute; top: 42%; width: 100%; height: 16%; background: var(--gold); }
        
        .discount-circle { 
            width: 100px; height: 100px; border: 4px double var(--gold); border-radius: 50%; 
            margin: 15px auto; display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: var(--gold); background: white; font-size: 1.2rem;
        }

        /* LISTA PAZIENTI */
        .p-card { background: white; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; cursor: pointer; border: none; }
        .badge-wait { background: #fff9e6; color: #d4a017; }
        .badge-done { background: #eaffea; color: #27ae60; }

        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; font-size: 1rem; background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="scena-setup" class="scena">
        <h2>Configura Studio</h2>
        <input type="text" id="s-nome" placeholder="Nome Dottore" style="width:100%; padding:15px; margin:10px 0;">
        <input type="text" id="s-studio" placeholder="Indirizzo Studio" style="width:100%; padding:15px; margin:10px 0;">
        <input type="tel" id="s-wa" placeholder="WhatsApp (es: 39333...)" style="width:100%; padding:15px; margin:10px 0;">
        <button class="btn-main" onclick="salvaProfilo()">ATTIVA</button>
    </div>

    <div id="scena-dashboard" class="scena">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b id="d-nome">Dr. Ginevri</b>
            <i class="fas fa-cog" onclick="localStorage.clear(); location.reload();"></i>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><b id="stat-p">0</b>Pazienti</div>
            <div class="stat-card"><b id="stat-r">0</b>Amici</div>
        </div>
        <div class="qr-card">
            <div id="qrcode"></div>
            <select id="svc-select" class="btn-main" style="background:white; color:var(--primary); border:1px solid var(--primary); margin-top:15px;" onchange="aggiornaQR()">
                <option value="Sconto 10€">Sconto 10€</option>
                <option value="Linfodrenaggio -25%">Linfodrenaggio -25%</option>
                <option value="Massaggio Sportivo -25%">Massaggio Sportivo -25%</option>
                <option value="Analisi Posturale -25%">Analisi Posturale -25%</option>
            </select>
        </div>
        <button class="btn-main" onclick="nuovoPaziente()">AGGIUNGI PAZIENTE +</button>
        <div id="lista-pazienti" style="margin-top:20px;"></div>
    </div>

    <div id="scena-regalo" class="scena">
        <div style="text-align:center; padding-top:20px;">
            <h2 id="r-dr">Dr. Luca Ginevri</h2>
            <p>Ti ha inviato un regalo professionale</p>
            <div class="gift-container">
                <div class="gift-bow"></div>
                <div class="gift-box"><div class="ribbon-v"></div><div class="ribbon-h"></div></div>
            </div>
            <div class="discount-circle" id="r-svc">10€</div>
            <button class="btn-main" onclick="prenotaPaziente()">PRENOTA ORA</button>
            <p id="r-studio" style="font-size:0.8rem; color:#888; margin-top:20px;"></p>
        </div>
    </div>

</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcQk1sogiuPVVlz2bSKzytK_trwICRYDVKblsHbWb_dpSbFpQwDHOLlyseLp2M0mlu/exec";
    let profilo = JSON.parse(localStorage.getItem('osteo_p')) || null;
    let pazienti = JSON.parse(localStorage.getItem('osteo_l')) || [];
    let currentID = "INVITO";

    window.onload = () => {
        if(window.location.hash.includes("#regalo")) mostraRegalo();
        else if(!profilo) attivaScena('setup');
        else iniziaDash();
    };

    function attivaScena(id) {
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active'));
        document.getElementById('scena-' + id).classList.add('active');
    }

    function salvaProfilo() {
        profilo = { n: document.getElementById('s-nome').value, s: document.getElementById('s-studio').value, w: document.getElementById('s-wa').value };
        localStorage.setItem('osteo_p', JSON.stringify(profilo));
        iniziaDash();
    }

    function iniziaDash() {
        attivaScena('dashboard');
        document.getElementById('d-nome').innerText = profilo.n;
        renderLista();
        aggiornaQR();
    }

    function aggiornaQR() {
        const svc = document.getElementById('svc-select').value;
        const link = window.location.origin + window.location.pathname + "#regalo?ref=" + currentID + "&svc=" + encodeURIComponent(svc) + "&dr=" + encodeURIComponent(profilo.n) + "&wa=" + profilo.w + "&loc=" + encodeURIComponent(profilo.s);
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: link, width: 150, height: 150, colorDark: "#008080" });
    }

    function nuovoPaziente() {
        if(pazienti.length >= 5) return alert("Limite Free raggiunto!");
        const nome = prompt("Nome Paziente:");
        if(!nome) return;
        const id = nome.substring(0,3).toUpperCase() + Math.floor(1000+Math.random()*9000);
        const p = { id: id, nome: nome, stato: 'ATTESA', svc: document.getElementById('svc-select').value, ref: 0, d: new Date().toLocaleDateString() };
        pazienti.push(p);
        sync(p);
    }

    function renderLista() {
        const div = document.getElementById('lista-pazienti');
        div.innerHTML = "";
        let rTot = 0;
        pazienti.forEach((p, i) => {
            rTot += p.ref;
            div.innerHTML += `
                <div class="p-card">
                    <div onclick="currentID='${p.id}'; aggiornaQR(); alert('QR aggiornato!');">
                        <b>${p.nome}</b><br><small>ID: ${p.id} | Amici: ${p.ref}</small>
                    </div>
                    <div style="text-align:right">
                        <button class="badge ${p.stato=='ATTESA'?'badge-wait':'badge-done'}" onclick="toggleS(${i})">${p.stato}</button><br>
                        <small onclick="addR(${i})" style="color:var(--primary); cursor:pointer">+1 Amico</small>
                    </div>
                </div>`;
        });
        document.getElementById('stat-p').innerText = pazienti.length;
        document.getElementById('stat-r').innerText = rTot;
    }

    function addR(i) { pazienti[i].ref++; sync(pazienti[i]); }
    function toggleS(i) { pazienti[i].stato = pazienti[i].stato == 'ATTESA' ? 'USATO' : 'ATTESA'; sync(pazienti[i]); }

    function sync(p) {
        localStorage.setItem('osteo_l', JSON.stringify(pazienti));
        renderLista();
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(p) });
    }

    function mostraRegalo() {
        attivaScena('regalo');
        const params = new URLSearchParams(window.location.hash.split('?')[1]);
        document.getElementById('r-dr').innerText = params.get('dr') || "Il tuo Osteopata";
        document.getElementById('r-svc').innerText = params.get('svc') || "SCONTO";
        document.getElementById('r-studio').innerText = params.get('loc') || "";
    }

    function prenotaPaziente() {
        const params = new URLSearchParams(window.location.hash.split('?')[1]);
        const msg = encodeURIComponent("Ciao! Ho ricevuto il regalo " + params.get('svc') + ". Mi ha invitato: " + params.get('ref'));
        window.open("https://wa.me/" + params.get('wa') + "?text=" + msg);
    }
</script>
</body>
</html>
