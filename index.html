<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Premium Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* =====================================================================
           [SECTION 1] - DESIGN SYSTEM & VARIABLES
           =====================================================================
        */
        :root { 
            --primary-teal: #008080; 
            --premium-gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #fbf5b7 0%, #d4af37 50%, #a67c00 100%);
            --soft-gold: #f4e3b1;
            --pure-white: #ffffff;
            --bg-canvas: #f8fafc;
            --slate-gray: #64748b;
            --dark-text: #1e293b;
            --danger-red: #ef4444;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-canvas); font-family: 'Montserrat', sans-serif; color: var(--dark-text); display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 500px; min-height: 100vh; background: var(--pure-white);
            display: flex; flex-direction: column; position: relative;
            border-left: 5px solid var(--premium-gold); border-right: 5px solid var(--premium-gold);
        }

        .header-main { padding: 60px 20px 20px; text-align: center; }
        .brand-logo { font-family: 'Comfortaa', cursive; font-size: 3.5rem; color: var(--primary-teal); font-weight: 700; letter-spacing: -3px; }
        .brand-logo span { color: var(--premium-gold); }
        .brand-sub { font-size: 0.8rem; font-weight: 800; color: var(--slate-gray); letter-spacing: 5px; text-transform: uppercase; margin-top: -5px; }
        .biz-display-header { font-weight: 800; color: var(--premium-gold); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; margin-top: 10px; }

        .view-scene { display: none; padding: 30px; flex-direction: column; }
        .view-scene.active { display: flex; }

        .card-ui { background: var(--pure-white); padding: 25px; border-radius: var(--radius-lg); border: 2px solid var(--soft-gold); margin-bottom: 25px; }
        .field-group { margin-bottom: 20px; }
        .field-label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--primary-teal); margin-bottom: 10px; }
        
        input, select { width: 100%; padding: 18px 22px; border-radius: var(--radius-md); border: 2px solid #f1f5f9; font-family: 'Montserrat', sans-serif; font-size: 1rem; background: #f8fafc; outline: none; }

        .btn-action { width: 100%; padding: 22px; border-radius: var(--radius-md); border: none; font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-primary { background: var(--primary-teal); color: var(--pure-white); }
        .btn-gold { background: var(--premium-gold); color: var(--pure-white); }

        .counter-display { text-align: center; padding: 40px 0; }
        .counter-number { font-size: 5rem; font-weight: 800; color: var(--primary-teal); }
        .counter-label { font-weight: 700; color: var(--slate-gray); text-transform: uppercase; letter-spacing: 3px; font-size: 0.85rem; }

        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border: 1px solid #f1f5f9; border-radius: var(--radius-md); margin-bottom: 15px; }
        .row-info b { color: var(--primary-teal); display: block; }
        .row-tools { display: flex; gap: 10px; }
        
        .tool-link { padding: 10px 15px; background: #25D366; color: white; text-decoration: none; border-radius: 8px; font-weight: 800; font-size: 0.8rem; }
        .tool-btn-pts { padding: 10px 15px; background: var(--premium-gold); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }

        /* PACCO REGALO */
        .gift-container { margin: 0 auto 35px; width: 100px; height: 100px; position: relative; }
        .gift-box-premium { width: 80px; height: 65px; background: var(--primary-teal); border-radius: 8px; position: absolute; bottom: 0; left: 10px; border: 2px solid var(--premium-gold); }
        .gift-box-premium::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 8px; background: var(--gold-gradient); transform: translateY(-50%); }
        .gift-box-premium::after { content: ''; position: absolute; left: 50%; top: 0; width: 8px; height: 100%; background: var(--gold-gradient); transform: translateX(-50%); }

        .dots-grid { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .fidelity-point { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--premium-gold); position: relative; }
        .fidelity-point.filled { background: var(--premium-gold); }
        .fidelity-point.filled::after { content: 'X'; color: white; font-size: 12px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; }

        .qr-output-box { margin: 30px auto; padding: 15px; background: white; border: 1px solid #f1f5f9; }
        .win-notif-box { background: #fffcf0; border: 2px solid var(--premium-gold); padding: 20px; border-radius: var(--radius-lg); margin-top: 20px; display: none; text-align: center; }
        
        .footer-branding { padding: 40px 20px; text-align: center; margin-top: auto; font-size: 0.7rem; color: var(--slate-gray); font-weight: 800; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="header-main">
            <div class="brand-logo">SPICH<span>.</span></div>
            <div class="brand-sub">Premium Network</div>
            <div id="display-dash-biz-name" class="biz-display-header" style="display:none;"></div>
        </header>

        <main id="view-setup" class="view-scene">
            <div class="card-ui">
                <div class="field-group"><label class="field-label">Nome Attività</label><input type="text" id="setup-name"></div>
                <div class="field-group"><label class="field-label">WhatsApp Business</label><input type="tel" id="setup-phone"></div>
                <div class="field-group"><label class="field-label">Settore</label><select id="setup-type"><option value="Salute">Sanitario</option><option value="Ristorazione">Food</option><option value="Wellness">Wellness</option></select></div>
                <button class="btn-action btn-primary" onclick="initBusinessProfile()">ATTIVA PROFILO</button>
            </div>
        </main>

        <main id="view-dash" class="view-scene">
            <div class="counter-display">
                <div class="counter-number" id="stats-total">0</div>
                <div class="counter-label" id="stats-label">Database</div>
            </div>
            <div class="card-ui">
                <div class="field-group"><label class="field-label" id="label-client-name">Nome</label><input type="text" id="new-client-name"></div>
                <div class="field-group"><label class="field-label">WhatsApp</label><input type="tel" id="new-client-tel"></div>
                <div class="field-group">
                    <label class="field-label">Sconto Amico</label>
                    <select id="val-referral"><option value="Sconto 10%">10%</option><option value="Sconto 20%">20%</option></select>
                </div>
                <input type="hidden" id="val-loyalty" value="Trattamento Omaggio">
                <button id="btn-submit-main" class="btn-action btn-primary" onclick="registerNewPatient()">CREA VOUCHER</button>
            </div>
            <div id="main-list-render"></div>
        </main>

        <main id="view-voucher" class="view-scene">
            <div style="text-align:center;">
                <div class="gift-container"><div class="gift-box-premium"></div></div>
                <h2 id="display-biz-name" style="color:var(--primary-teal);">STUDIO</h2>
                <p id="display-user-name" style="margin-bottom:20px;">Benvenuto</p>
                <div class="dots-grid"><div class="fidelity-point"></div><div class="fidelity-point"></div><div class="fidelity-point"></div><div class="fidelity-point"></div><div class="fidelity-point"></div></div>
                <div id="display-win-box" class="win-notif-box"><p id="display-reward-desc"></p></div>
                <div class="qr-output-box"><div id="qrcode-canvas"></div></div>
                <button class="btn-action btn-gold" onclick="shareVoucherLink()">INVIA REGALO A UN AMICO</button>
            </div>
        </main>

        <footer class="footer-branding">SPICH. DIGITAL NETWORK</footer>
    </div>

    <script>
        const GOOGLE_ENDPOINT = "https://script.google.com/macros/s/AKfycbyh4CGnWQWyvztKvTkbQ9_TOUMb3EQaB6bZySuamZeRkYSe_1VBvWJYXc2LcESKWS1sdg/exec";
        let state = {
            deviceID: localStorage.getItem('spich_id') || 'ID-' + Math.random().toString(36).substr(2, 5).toUpperCase(),
            bizProfile: JSON.parse(localStorage.getItem('spich_biz') || 'null'),
            patientDb: JSON.parse(localStorage.getItem('spich_db') || '[]')
        };

        window.addEventListener('DOMContentLoaded', () => {
            if(!localStorage.getItem('spich_id')) localStorage.setItem('spich_id', state.deviceID);
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('v') === 'gift') { initVoucherMode(urlParams); } 
            else if (!state.bizProfile) { navigateTo('setup'); } 
            else { navigateTo('dash'); refreshUI(); }
        });

        function navigateTo(id) { document.querySelectorAll('.view-scene').forEach(s => s.classList.remove('active')); document.getElementById('view-' + id).classList.add('active'); }

        function initBusinessProfile() {
            const n = document.getElementById('setup-name').value;
            const p = document.getElementById('setup-phone').value;
            state.bizProfile = { name: n, phone: '39' + p, sector: document.getElementById('setup-type').value };
            localStorage.setItem('spich_biz', JSON.stringify(state.bizProfile));
            location.reload();
        }

        function registerNewPatient() {
            const cN = document.getElementById('new-client-name').value;
            const cT = document.getElementById('new-client-tel').value;
            const cR = document.getElementById('val-referral').value;
            const cid = 'C-' + Date.now();
            const rec = { cid, nome: cN, tel: '39' + cT.replace(/\D/g, ''), sconto: cR, pts: 0 };
            state.patientDb.unshift(rec);
            localStorage.setItem('spich_db', JSON.stringify(state.patientDb));
            fetch(GOOGLE_ENDPOINT, { method: "POST", mode: "no-cors", body: JSON.stringify({ t: "ADD", biz: state.deviceID, nome: cN, tel: rec.tel, cid: cid }) });
            refreshUI();
        }

        function refreshUI() {
            const area = document.getElementById('main-list-render'); area.innerHTML = "";
            document.getElementById('stats-total').innerText = state.patientDb.length;
            state.patientDb.forEach((p, i) => {
                const link = `${window.location.href.split('?')[0]}?v=gift&st=${encodeURIComponent(state.bizProfile.name)}&n=${encodeURIComponent(p.nome)}&cid=${p.cid}&sc=${encodeURIComponent(p.sconto)}`;
                area.innerHTML += `<div class="row-item"><div><b>${p.nome}</b><span>${p.pts} Punti</span></div><div class="row-tools"><a href="https://wa.me/${p.tel}?text=${encodeURIComponent(link)}" class="tool-link">WA</a><button class="tool-btn-pts" onclick="addPt(${i})">+1</button></div></div>`;
            });
        }

        function addPt(i) {
            state.patientDb[i].pts++;
            localStorage.setItem('spich_db', JSON.stringify(state.patientDb));
            refreshUI();
        }

        function initVoucherMode(p) {
            navigateTo('voucher');
            document.getElementById('display-biz-name').innerText = p.get('st');
            document.getElementById('display-user-name').innerText = "Ciao, " + p.get('n');
            new QRCode(document.getElementById("qrcode-canvas"), { text: window.location.href, width: 150, height: 150 });
        }

        function shareVoucherLink() {
            const p = new URLSearchParams(window.location.search);
            const msg = `Ciao! Guarda che regalo da ${p.get('st')}: ${p.get('sc')} per te! Clicca qui: ${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
