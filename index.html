<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Referral Pass</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #008080; --gold: #d4af37; --bg: #fdfdfd; --gray: #e8e8e8; --gold-bright: #ffcc33; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f4f6f7; margin: 0; font-family: 'Montserrat', sans-serif; color: #2c3e50; overflow-x: hidden; }
        
        .app-container { background: var(--bg); width: 100vw; min-height: 100vh; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        .header { padding: 20px; text-align: center; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Comfortaa', cursive; font-size: 2.2rem; color: var(--primary); margin: 0; }
        .logo span { color: var(--gold); }

        .scena { display: none; padding: 20px; flex: 1; opacity: 0; }
        .active { display: block; opacity: 1; transition: opacity 0.3s ease; }

        /* DASHBOARD */
        .stat-card { background: white; padding: 18px; border-radius: 18px; text-align: center; border-bottom: 5px solid var(--gold); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card b { font-size: 2.2rem; color: var(--primary); display: block; }
        .p-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        
        /* IL PACCO REGALO & FIOCCO (Check finale: asole integre) */
        .gift-box-container { position: relative; width: 100px; height: 100px; margin: 50px auto 20px; }
        .fiocco-wrap { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 70px; height: 30px; z-index: 10; display: flex; justify-content: center; }
        .asola { width: 35px; height: 25px; border: 6px solid var(--gold); border-radius: 50% 50% 0 50%; transform: rotate(-10deg); background: transparent; }
        .asola.right { border-radius: 50% 50% 50% 0%; transform: rotate(10deg); }
        .pacco { width: 100%; height: 100%; background: var(--primary); border-radius: 10px; position: relative; overflow: hidden; }
        .nastro-v { position: absolute; left: 42%; width: 16%; height: 100%; background: var(--gold); }
        .nastro-h { position: absolute; top: 42%; width: 100%; height: 16%; background: var(--gold); }

        /* BARRA 5 AMICI (Check finale: tondi oro) */
        .progresso-container { display: flex; justify-content: center; gap: 12px; margin: 30px 0; }
        .cerchio { width: 48px; height: 48px; border-radius: 50%; border: 3px solid var(--gray); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #ccc; }
        .cerchio.attivo { border-color: var(--gold); background: var(--gold); color: white; transform: scale(1.1); box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }

        /* PULSANTI */
        .btn-teal { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 10px; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; }
        .btn-prenota { background: var(--gold-bright); color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 20px; box-shadow: 0 8px 15px rgba(255,204,51,0.3); }
        
        .banner-oro { background: var(--gold); color: white; padding: 18px; border-radius: 12px; margin: 25px auto; width: 90%; font-weight: 800; text-align: center; text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-family: 'Montserrat'; font-size: 1rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1 class="logo">SPICH<span>.</span></h1></div>

    <div id="scena-setup" class="scena">
        <h2 style="text-align:center; color:var(--primary);">Configura Studio</h2>
        <input type="text" id="set-att" placeholder="Nome Attività">
        <input type="tel" id="set-wa" placeholder="WhatsApp (es. 39333...)">
        <button class="btn-teal" onclick="salvaSetup()">CONFIGURA ORA</button>
    </div>

    <div id="scena-dash" class="scena">
        <div class="stat-card"><b id="count-r">0</b><span>Amici Portati</span></div>
        <div style="background:white; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:20px;">
            <input type="text" id="new-nome" placeholder="Nome cliente">
            <select id="new-premio">
                <option value="Sconto 20%">Sconto 20%</option>
                <option value="Sconto 50%">Sconto 50%</option>
                <option value="Drink Omaggio">Drink Omaggio</option>
                <option value="Seduta Omaggio">Seduta Omaggio</option>
            </select>
            <button class="btn-teal" onclick="nuovoCliente()">AGGIUNGI CLIENTE</button>
        </div>
        <div id="lista-clienti"></div>
    </div>

    <div id="scena-regalo" class="scena">
        <div style="text-align:center;">
            <h2 id="reg-att" style="color:var(--primary);">...</h2>
            <p>GIFT PASS DI: <b id="reg-cliente" style="color:var(--gold)">...</b></p>
            
            <div class="gift-box-container">
                <div class="fiocco-wrap"><div class="asola"></div><div class="asola right"></div></div>
                <div class="pacco"><div class="nastro-v"></div><div class="nastro-h"></div></div>
            </div>

            <div class="progresso-container" id="barra-cerchi"></div>
            <p id="msg-stato" style="font-weight:800; color:var(--primary);"></p>

            <div id="area-qr" style="display:none; margin-top:20px;">
                <div id="qrcode" style="display:inline-block; padding:10px; background:white; border:1px solid #eee; border-radius:10px;"></div>
                <p style="font-size:0.7rem; color:#aaa; margin-top:10px;">FAI INQUADRARE AI TUOI AMICI</p>
            </div>

            <div id="area-prenota" style="display:none;">
                <button class="btn-prenota" onclick="prenotaAmico()">PRENOTA IL TUO REGALO</button>
            </div>

            <div class="banner-oro" id="reg-premio">...</div>
        </div>
    </div>
</div>

<script>
    // URL DATABASE
    const API_URL = "https://script.google.com/macros/s/AKfycbxFUjiCtsl4dM10L7Mz_URnUJvK8EqAnmCS4PQj-DYVCH7jqnw6vMXkaRV3yHdeZlBw/exec";
    
    // Inizializzazione sicura
    let config = null;
    let clienti = [];

    try {
        config = JSON.parse(localStorage.getItem('spich_cfg'));
        clienti = JSON.parse(localStorage.getItem('spich_cli')) || [];
    } catch(e) {
        console.error("Errore storage, reset...");
        localStorage.clear();
    }

    window.onload = function() {
        const p = new URLSearchParams(window.location.search);
        if (p.get('v') === 'gift') {
            mostra('regalo');
            initCliente(p);
        } else if (!config) {
            mostra('setup');
        } else {
            mostra('dash');
            renderDash();
        }
    };

    function mostra(id) {
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active'));
        const target = document.getElementById('scena-' + id);
        if(target) target.classList.add('active');
    }

    function salvaSetup() {
        const n = document.getElementById('set-att').value;
        const w = document.getElementById('set-wa').value;
        if(!n || !w) return alert("Inserisci Nome e WhatsApp");
        config = { n: n, w: w };
        localStorage.setItem('spich_cfg', JSON.stringify(config));
        location.reload();
    }

    function nuovoCliente() {
        const nome = document.getElementById('new-nome').value;
        const premio = document.getElementById('new-premio').value;
        if(!nome) return alert("Nome mancante");
        const id = "SP" + Math.floor(1000 + Math.random() * 9000);
        const c = { id: id, nome: nome, ref: 0, waStudio: config.w, att: config.n, premio: premio };
        clienti.push(c);
        sync(c);
        document.getElementById('new-nome').value = "";
    }

    function renderDash() {
        const cont = document.getElementById('lista-clienti');
        cont.innerHTML = "";
        let tot = 0;
        clienti.forEach((c, i) => {
            tot += c.ref;
            cont.innerHTML += `<div class="p-item">
                <div><b>${c.nome}</b><br><small>${c.ref}/5 Amici • ${c.premio}</small></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-wa" onclick="inviaWA(${i})"><i class="fab fa-whatsapp"></i></button>
                    <button onclick="addRef(${i})" style="margin-left:10px; background:var(--gold); color:white; border:none; padding:10px 15px; border-radius:10px; font-weight:800;">+1</button>
                </div>
            </div>`;
        });
        document.getElementById('count-r').innerText = tot;
    }

    function addRef(i) {
        if(clienti[i].ref < 5) {
            clienti[i].ref++;
            sync(clienti[i]);
        }
    }

    function inviaWA(i) {
        const c = clienti[i];
        const link = window.location.origin + window.location.pathname + "?v=gift&id=" + c.id + "&paz=" + encodeURIComponent(c.nome) + "&dr=" + encodeURIComponent(config.n) + "&wa=" + config.w + "&pre=" + encodeURIComponent(c.premio);
        window.open("https://wa.me/?text=" + encodeURIComponent("Ciao " + c.nome + "! Ecco il tuo SPICH PASS personale: " + link));
    }

    async function initCliente(p) {
        document.getElementById('reg-att').innerText = p.get('dr') || "SPICH Studio";
        document.getElementById('reg-cliente').innerText = p.get('paz') || "Cliente";
        document.getElementById('reg-premio').innerText = p.get('pre') || "Sconto Speciale";
        
        let r = 0;
        try {
            const resp = await fetch(API_URL + "?id=" + p.get('id'));
            const data = await resp.json();
            r = data.ref || 0;
        } catch(e) { console.log("Offline mode"); }

        const barra = document.getElementById('barra-cerchi');
        barra.innerHTML = "";
        for(let i=1; i<=5; i++) {
            const attivo = i <= r ? 'attivo' : '';
            barra.innerHTML += `<div class="cerchio ${attivo}">${i <= r ? '★' : i}</div>`;
        }

        if(window.location.hash === "#amico") {
            document.getElementById('area-prenota').style.display = "block";
            document.getElementById('msg-stato').innerText = "Hai ricevuto un regalo!";
        } else {
            document.getElementById('area-qr').style.display = "block";
            document.getElementById('msg-stato').innerText = r < 5 ? "Ti mancano " + (5-r) + " amici!" : "PREMIO SBLOCCATO!";
            new QRCode(document.getElementById("qrcode"), { text: window.location.href + "#amico", width: 140, height: 140 });
        }
    }

    function prenotaAmico() {
        const p = new URLSearchParams(window.location.search);
        const msg = encodeURIComponent("Ciao! Vorrei prenotare per riscattare il regalo di " + p.get('paz'));
        window.open("https://wa.me/" + p.get('wa') + "?text=" + msg);
    }

    function sync(c) {
        localStorage.setItem('spich_cli', JSON.stringify(clienti));
        renderDash();
        fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(c) });
    }
</script>
</body>
</html>
