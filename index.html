<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Referral System</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #008080; --gold: #d4af37; --bg: #fdfdfd; --gray: #e8e8e8; --gold-bright: #ffcc33; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f4f6f7; margin: 0; font-family: 'Montserrat', sans-serif; color: #2c3e50; }
        
        .app-container { background: var(--bg); width: 100vw; min-height: 100vh; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        /* HEADER */
        .header { padding: 20px; text-align: center; background: white; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Comfortaa', cursive; font-size: 2.2rem; color: var(--primary); margin: 0; }
        .logo span { color: var(--gold); }

        .scena { display: none; padding: 20px; flex: 1; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* DASHBOARD TITOLARE */
        .stat-card { background: white; padding: 18px; border-radius: 18px; text-align: center; border-bottom: 5px solid var(--gold); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card b { font-size: 2rem; color: var(--primary); display: block; }
        
        .form-aggiunta { background: white; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 20px; }
        .p-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .p-info b { color: var(--primary); font-size: 1rem; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 10px; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; margin-right: 10px; }

        /* IL PACCO REGALO & FIOCCO */
        .gift-box-container { position: relative; width: 100px; height: 100px; margin: 50px auto 20px; }
        .fiocco-wrap { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 70px; height: 30px; z-index: 10; display: flex; justify-content: center; }
        .asola { width: 35px; height: 25px; border: 6px solid var(--gold); border-radius: 50% 50% 0 50%; transform: rotate(-10deg); }
        .asola.right { border-radius: 50% 50% 50% 0%; transform: rotate(10deg); }
        .pacco { width: 100%; height: 100%; background: var(--primary); border-radius: 10px; position: relative; overflow: hidden; }
        .nastro-v { position: absolute; left: 42%; width: 16%; height: 100%; background: var(--gold); }
        .nastro-h { position: absolute; top: 42%; width: 100%; height: 16%; background: var(--gold); }

        /* BARRA 5 CERCHI */
        .progresso-container { display: flex; justify-content: center; gap: 12px; margin: 30px 0; }
        .cerchio { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--gray); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #ccc; transition: 0.4s; }
        .cerchio.attivo { border-color: var(--gold); background: var(--gold); color: white; transform: scale(1.1); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }

        /* BOTTONI E INPUT */
        .banner-oro { background: var(--gold); color: white; padding: 18px; border-radius: 12px; margin: 25px auto; width: 90%; font-weight: 800; text-transform: uppercase; text-align: center; }
        .btn-teal { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1.1rem; }
        .btn-prenota { background: var(--gold-bright); color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; font-size: 1.2rem; text-transform: uppercase; box-shadow: 0 10px 20px rgba(255,204,51,0.4); margin-top: 20px; }
        
        input, select { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; }
        #qrcode { background: white; padding: 12px; display: inline-block; border: 1px solid #eee; border-radius: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1 class="logo">SPICH<span>.</span></h1></div>

    <div id="scena-setup" class="scena">
        <h2 style="text-align:center; font-family:'Comfortaa'; color:var(--primary);">Configura Attività</h2>
        <input type="text" id="set-att" placeholder="Nome Attività (es. Ristorante da Marco)">
        <input type="tel" id="set-wa" placeholder="WhatsApp Attività (es. 39333...)">
        <button class="btn-teal" style="margin-top:20px;" onclick="salvaSetup()">ATTIVA SPICH</button>
    </div>

    <div id="scena-dash" class="scena">
        <div class="stat-card"><b id="count-r">0</b><span>Amici Portati Totali</span></div>
        <div class="form-aggiunta">
            <input type="text" id="new-nome" placeholder="Nome nuovo cliente">
            <select id="new-premio">
                <option value="Sconto 20%">Sconto 20%</option>
                <option value="Sconto 50%">Sconto 50%</option>
                <option value="Drink Omaggio">Drink Omaggio</option>
                <option value="Trattamento Omaggio">Trattamento Omaggio</option>
            </select>
            <button class="btn-teal" onclick="nuovoCliente()">AGGIUNGI CLIENTE +</button>
        </div>
        <div id="lista-clienti"></div>
    </div>

    <div id="scena-regalo" class="scena">
        <div style="text-align:center;">
            <h2 id="reg-att" style="font-family:'Comfortaa'; color:var(--primary); margin-bottom:5px;">...</h2>
            <p style="font-size:0.75rem; color:#999;">GIFT PASS DI: <b id="reg-cliente" style="color:var(--gold)">...</b></p>
            
            <div class="gift-box-container">
                <div class="fiocco-wrap"><div class="asola"></div><div class="asola right"></div></div>
                <div class="pacco"><div class="nastro-v"></div><div class="nastro-h"></div></div>
            </div>

            <div class="progresso-container" id="barra-cerchi"></div>
            <p id="msg-stato" style="font-weight:800; color:var(--primary); min-height:1.2em;"></p>

            <div id="area-qr" style="display:none;">
                <div id="qrcode"></div>
                <p style="font-size:0.7rem; color:#aaa; margin-top:10px;">FAI INQUADRARE AI TUOI AMICI</p>
            </div>

            <div id="area-prenota" style="display:none;">
                <button class="btn-prenota" onclick="prenotaAmico()">PRENOTA IL TUO REGALO</button>
            </div>

            <div class="banner-oro" id="reg-premio">...</div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFUjiCtsl4dM10L7Mz_URnUJvK8EqAnmCS4PQj-DYVCH7jqnw6vMXkaRV3yHdeZlBw/exec";
    
    let config = JSON.parse(localStorage.getItem('spich_cfg')) || null;
    let clienti = JSON.parse(localStorage.getItem('spich_cli')) || [];

    window.onload = async () => {
        const p = new URLSearchParams(window.location.search);
        if (p.get('v') === 'gift') {
            mostra('regalo');
            await initCliente(p);
        } else if (!config) {
            mostra('setup');
        } else {
            mostra('dash');
            renderDash();
        }
    };

    function mostra(id) { 
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active')); 
        document.getElementById('scena-' + id).classList.add('active'); 
    }

    function salvaSetup() {
        const att = document.getElementById('set-att').value;
        const wa = document.getElementById('set-wa').value;
        if(!att || !wa) return alert("Inserisci i dati richiesti");
        config = { n: att, w: wa };
        localStorage.setItem('spich_cfg', JSON.stringify(config));
        location.reload();
    }

    function nuovoCliente() {
        const nome = document.getElementById('new-nome').value;
        const premio = document.getElementById('new-premio
