<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Business System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --primary: #008080; --gold: #d4af37; --bg: #fdfdfd; --danger: #e74c3c; --success: #2ecc71; --wa: #25D366; --light-blue: #E1F5FE; --shadow-main: 0 10px 30px rgba(0,0,0,0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #f0f2f5; font-family: 'Montserrat', sans-serif; color: #2c3e50; min-height: 100vh; }
        .app-container { background: var(--bg); width: 100%; min-height: 100vh; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.15); position: relative; }
        .header { padding: 30px 20px; text-align: center; background: white; border-bottom: 1px solid #f0f0f0; cursor: pointer; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Comfortaa', cursive; font-size: 3.2rem; color: var(--primary); letter-spacing: -2px; }
        .logo span { color: var(--gold); }
        .scena { display: none; padding: 25px; animation: fadeIn 0.5s; flex: 1; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .stat-card { background: white; padding: 40px 20px; border-radius: 30px; text-align: center; border-bottom: 8px solid var(--gold); margin-bottom: 30px; position: relative; box-shadow: var(--shadow-main); }
        .stat-card b { font-size: 3.8rem; color: var(--primary); display: block; }
        .badge-pro { background: #cbd5e0; color: white; padding: 6px 16px; border-radius: 12px; font-size: 0.75rem; position: absolute; top: 15px; right: 15px; font-weight: 900; }
        .badge-pro.is-pro { background: var(--success); }
        .form-box { background: white; padding: 25px; border-radius: 25px; border: 1px solid #f1f5f9; margin-bottom: 30px; }
        label { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 20px 0 8px 5px; display: block; }
        input, select { width: 100%; padding: 18px; border-radius: 16px; border: 1px solid #e2e8f0; font-size: 1.05rem; outline: none; background: #fbfcfd; }
        .btn-teal { background: var(--primary); color: white; border: none; padding: 22px; border-radius: 20px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1.2rem; margin-top: 25px; box-shadow: 0 8px 20px rgba(0,128,128,0.25); }
        .p-item { background: white; padding: 22px; border-radius: 24px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f5f9; }
        .btn-wa { background: var(--wa); color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.8rem; }
        .btn-ref { background: var(--gold); border: none; padding: 15px 25px; border-radius: 16px; color: white; font-weight: 900; cursor: pointer; }
        .lock-box { background: #fffafa; border: 2px dashed #feb2b2; border-radius: 25px; padding: 30px; text-align: center; display: none; }
        .btn-pro { background: var(--danger); color: white; padding: 18px; border-radius: 16px; width: 100%; font-weight: 800; margin-top: 15px; border: none; }
        .dots-wrapper { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .dot { width: 25px; height: 25px; border-radius: 50%; border: 3px solid #e2e8f0; background: #f8fafc; }
        .dot.fill { background: var(--primary); border-color: var(--primary); transform: scale(1.2); }
        .btn-share-wa { background: var(--light-blue); color: #0288D1; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; margin-top: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .banner-premio { background: var(--gold); color: white; padding: 25px; border-radius: 20px; margin-top: 30px; font-weight: 800; }
        #qrcode { display: flex; justify-content: center; margin-top: 20px; }
        .footer { font-size: 0.6rem; color: #cbd5e0; text-align: center; padding: 20px; margin-top: auto; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header" onclick="confermaLogout()">
        <h1 class="logo">SPICH<span>.</span></h1>
    </header>

    <main id="scena-setup" class="scena">
        <div style="text-align:center; margin-bottom:20px;">
            <h3 style="color:var(--primary); font-weight:900;">ATTIVA BUSINESS</h3>
        </div>
        <div class="form-box">
            <label>Nome Attività</label>
            <input type="text" id="setup-nome" placeholder="Es: Studio Rossi">
            <label>WhatsApp (con 39)</label>
            <input type="tel" id="setup-wa" placeholder="39347...">
            <label>Settore</label>
            <select id="setup-settore">
                <option value="Medica">Area Medica</option>
                <option value="Ristorazione">Ristorazione</option>
                <option value="Altro">Altro</option>
            </select>
            <button class="btn-teal" onclick="eseguiSetup()">ATTIVA ORA</button>
        </div>
    </main>

    <main id="scena-dash" class="scena">
        <div class="stat-card">
            <div id="badge-pro" class="badge-pro">FREE</div>
            <b id="contatore-num">0</b>
            <span id="label-plurale">PAZIENTI</span>
        </div>
        <div class="form-box">
            <label id="label-singolare">NOME E COGNOME</label>
            <input type="text" id="p-nome">
            <label>CELLULARE</label>
            <input type="tel" id="p-tel">
            <label>PREMIO</label>
            <select id="p-premio" onchange="togglePremioCustom()">
                <option value="Sconto 20%">Sconto 20%</option>
                <option value="Omaggio">Omaggio</option>
                <option value="CUSTOM">-- Custom (PRO) --</option>
            </select>
            <input type="text" id="p-custom" style="display:none; margin-top:10px;" placeholder="Descrivi premio...">
            <button id="btn-salva" class="btn-teal" onclick="creaNuovoContatto()">AGGIUNGI ORA</button>
            <div id="area-limite" class="lock-box">
                <p style="color:var(--danger); font-weight:900;">LIMITE 10/10 RAGGIUNTO</p>
                <button onclick="invioRichiestaPro()" class="btn-pro">PASSA A PRO</button>
            </div>
        </div>
        <div id="lista-render"></div>
    </main>

    <main id="scena-regalo" class="scena">
        <div style="text-align:center;">
            <i class="fas fa-gift" style="font-size:4rem; color:var(--primary); margin-bottom:20px;"></i>
            <h2 id="view-studio" style="color:var(--primary);"></h2>
            <div class="dots-wrapper" id="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div id="area-qr-view">
                <div id="qrcode"></div>
                <button class="btn-share-wa" onclick="condividiPassWA()">
                    <i class="fab fa-whatsapp"></i> INVITA UN AMICO
                </button>
            </div>
            <div id="banner-info-premio" class="banner-premio"></div>
            <div id="box-sbloccato" style="display:none; margin-top:20px;">
                <button class="btn-teal" onclick="contattaAttivita()">PRENOTA ORA</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        SPICH. BUSINESS SYSTEM 3.0<br>
        ID: <span id="id-display">...</span><br>
        &copy; 2026
    </footer>
</div>

<script>
    const G_URL = "https://script.google.com/macros/s/AKfycbyL97dtvTa7WzRFGpXSFcxgNYlpn844ft-ZQA49bBLhjDe5qzQ_26rYU9XtViMZr36zFA/exec";
    let devId = localStorage.getItem('spich_id') || ('SP-' + Math.random().toString(36).substr(2,6).toUpperCase());
    localStorage.setItem('spich_id', devId);
    
    let config = JSON.parse(localStorage.getItem('spich_cfg') || '{}');
    let lista = JSON.parse(localStorage.getItem('spich_list') || '[]');
    let isPro = false;

    window.onload = function() {
        document.getElementById('id-display').innerText = devId;
        const p = new URLSearchParams(window.location.search);
        
        if (p.get('v') === 'gift') {
            show('regalo');
            buildGift(p);
        } else if (!config.n) {
            show('setup');
        } else {
            show('dash');
            renderDash();
            checkPro();
        }
    };

    function show(id) {
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active'));
        document.getElementById('scena-' + id).classList.add('active');
    }

    function eseguiSetup() {
        const n = document.getElementById('setup-nome').value;
        const w = document.getElementById('setup-wa').value;
        if(!n || !w) return alert("Inserisci i dati");
        config = { n, w, s: document.getElementById('setup-settore').value };
        localStorage.setItem('spich_cfg', JSON.stringify(config));
        fetch(G_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({tipo:'REG', devId, n, w}) });
        location.reload();
    }

    function renderDash() {
        const area = document.getElementById('lista-render');
        area.innerHTML = "";
        lista.forEach((p, i) => {
            area.innerHTML += `<div class="p-item">
                <div><b>${p.nome}</b><br><small>${p.ref}/5 Punti</small></div>
                <div style="display:flex; gap:10px;">
                    <a class="btn-wa" href="${linkWA(p)}" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <button class="btn-ref" onclick="addPt(${i})">+1</button>
                </div>
            </div>`;
        });
        document.getElementById('contatore-num').innerText = lista.length;
        const limit = document.getElementById('area-limite');
        const btnS = document.getElementById('btn-salva');
        if(!isPro && lista.length >= 10) { limit.style.display='block'; btnS.style.display='none'; }
        else { limit.style.display='none'; btnS.style.display='block'; }
    }

    function linkWA(p) {
        const b = window.location.href.split('?')[0];
        const l = `${b}?v=gift&id=${p.id}&n=${encodeURIComponent(p.nome)}&st=${encodeURIComponent(config.n)}&wa=${config.w}&pr=${encodeURIComponent(p.premio)}&ref=${p.ref}`;
        return `https://wa.me/${p.tel}?text=${encodeURIComponent("Ciao! Ecco il tuo pass: " + l)}`;
    }

    function addPt(i) {
        lista[i].ref++;
        localStorage.setItem('spich_list', JSON.stringify(lista));
        renderDash();
        fetch(G_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({tipo:'PT', ...lista[i]}) });
    }

    function creaNuovoContatto() {
        const nome = document.getElementById('p-nome').value;
        const tel = document.getElementById('p-tel').value;
        let premio = document.getElementById('p-premio').value;
        if(premio === 'CUSTOM') premio = document.getElementById('p-custom').value;
        if(!nome || !tel) return alert("Dati mancanti");
        lista.push({ id:'R'+Date.now(), nome, tel, premio, ref:0 });
        localStorage.setItem('spich_list', JSON.stringify(lista));
        renderDash();
    }

    function buildGift(p) {
        document.getElementById('view-studio').innerText = p.get('st');
        document.getElementById('banner-info-premio').innerText = "IL TUO PREMIO: " + p.get('pr');
        const ref = parseInt(p.get('ref') || 0);
        const dots = document.querySelectorAll('.dot');
        for(let i=0; i<ref && i<5; i++) dots[i].classList.add('fill');
        if(ref >= 5) {
            document.getElementById('area-qr-view').style.display='none';
            document.getElementById('box-sbloccato').style.display='block';
        } else {
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 160, height: 160 });
        }
    }

    function condividiPassWA() {
        window.open(`https://wa.me/?text=${encodeURIComponent("Guarda che regalo! " + window.location.href)}`);
    }

    function contattaAttivita() {
        const u = new URLSearchParams(window.location.search);
        window.open(`https://wa.me/${u.get('wa')}?text=Ho completato i 5 punti!`);
    }

    async function checkPro() {
        try {
            const r = await fetch(G_URL + "?checkPro=" + devId);
            const d = await r.json();
            if(d.isPro === "SI") {
                isPro = true;
                document.getElementById('badge-pro').innerText = "PRO";
                document.getElementById('badge-pro').classList.add('is-pro');
                renderDash();
            }
        } catch(e) {}
    }

    function togglePremioCustom() {
        document.getElementById('p-custom').style.display = (document.getElementById('p-premio').value === 'CUSTOM') ? 'block' : 'none';
    }

    function confermaLogout() { if(confirm("Resettare tutto?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
                </html>
