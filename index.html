<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Premium Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* ---------------------------------------------------------------------
           [SECTION 1] - DESIGN SYSTEM (VARIABILI)
           ---------------------------------------------------------------------
        */
        :root { 
            --primary-teal: #008080; 
            --dark-teal: #006666;
            --premium-gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #fbf5b7 0%, #d4af37 50%, #a67c00 100%);
            --deep-blue: #003366; 
            --soft-gold: #f4e3b1;
            --pure-white: #ffffff;
            --bg-canvas: #f8fafc;
            --slate-gray: #64748b;
            --dark-text: #1e293b;
            --danger-red: #ef4444;
            --success-green: #10b981;
            
            /* Elevation & Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --card-shadow: 0 10px 40px rgba(0,0,0,0.06);
            
            /* Border Radius */
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        /* ---------------------------------------------------------------------
           [SECTION 2] - RESET E SETUP BASE
           ---------------------------------------------------------------------
        */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            height: 100%;
            background: var(--bg-canvas);
            font-family: 'Montserrat', sans-serif;
            color: var(--dark-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
        }

        /* Container principale con cornicette premium */
        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: var(--pure-white);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
            border-left: 6px solid var(--premium-gold);
            border-right: 6px solid var(--premium-gold);
        }

        /* ---------------------------------------------------------------------
           [SECTION 3] - HEADER E BRANDING
           ---------------------------------------------------------------------
        */
        .header-main {
            padding: 60px 20px 20px;
            text-align: center;
        }

        .brand-logo {
            font-family: 'Comfortaa', cursive;
            font-size: 3.5rem;
            color: var(--primary-teal);
            font-weight: 700;
            letter-spacing: -3px;
            display: inline-block;
        }

        .brand-logo span {
            color: var(--premium-gold);
        }

        .brand-sub {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--slate-gray);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: -5px;
            margin-bottom: 10px;
        }

        .biz-display-header {
            font-weight: 800;
            color: var(--premium-gold);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* ---------------------------------------------------------------------
           [SECTION 4] - SCENES & ANIMATIONS
           ---------------------------------------------------------------------
        */
        .view-scene {
            display: none;
            padding: 30px;
            flex-direction: column;
            animation: fadeInTransition 0.5s ease-out;
        }

        .view-scene.active {
            display: flex;
        }

        @keyframes fadeInTransition {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------------------------------------------------------------------
           [SECTION 5] - UI COMPONENTS (CARDS, INPUTS, BUTTONS)
           ---------------------------------------------------------------------
        */
        .card-ui {
            background: var(--pure-white);
            padding: 25px;
            border-radius: var(--radius-lg);
            border: 2px solid var(--soft-gold);
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--primary-teal);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 18px 22px;
            border-radius: var(--radius-md);
            border: 2px solid #f1f5f9;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark-text);
            background: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-teal);
            background: var(--pure-white);
            box-shadow: 0 0 0 5px rgba(0, 128, 128, 0.08);
        }

        .btn-action {
            width: 100%;
            padding: 22px;
            border-radius: var(--radius-md);
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary { background: var(--primary-teal); color: var(--pure-white); }
        .btn-gold { background: var(--premium-gold); color: var(--pure-white); }
        .btn-action:active { transform: scale(0.96); }

        /* ---------------------------------------------------------------------
           [SECTION 6] - DASHBOARD SPECIFIC UI
           ---------------------------------------------------------------------
        */
        .counter-display {
            text-align: center;
            padding: 30px 0;
        }

        .counter-number {
            font-size: 5rem;
            font-weight: 800;
            color: var(--primary-teal);
            line-height: 1;
        }

        .counter-label {
            font-weight: 700;
            color: var(--slate-gray);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.85rem;
        }

        .row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--pure-white);
            border: 1px solid #f1f5f9;
            border-radius: var(--radius-md);
            margin-bottom: 15px;
            box-shadow: var(--shadow-sm);
        }

        .row-info b { color: var(--primary-teal); font-size: 1.1rem; display: block; }
        .row-info span { color: var(--slate-gray); font-size: 0.85rem; font-weight: 600; }

        .tool-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .btn-wa-action { background: #25D366; }
        .btn-pts-action { background: var(--premium-gold); font-weight: 900; }

        /* ---------------------------------------------------------------------
           [SECTION 7] - IL PACCO REGALO PREMIUM (STILIZZATO & ANIMATO)
           ---------------------------------------------------------------------
        */
        .gift-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 40px;
            animation: floatingGift 3.5s ease-in-out infinite;
        }

        @keyframes floatingGift {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        /* Scatola Blu Notte */
        .box-body {
            position: absolute;
            bottom: 10px;
            left: 20px;
            width: 100px;
            height: 85px;
            background: var(--deep-blue);
            border-radius: 12px;
            border: 2.5px solid var(--premium-gold);
            box-shadow: 0 15px 35px rgba(0, 51, 102, 0.4);
            z-index: 2;
        }

        /* Nastro Verticale Oro */
        .box-body::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 100%;
            background: var(--gold-gradient);
        }

        /* Nastro Orizzontale Oro */
        .box-body::after {
            content: '';
            position: absolute;
            top: 30%;
            width: 100%;
            height: 14px;
            background: var(--gold-gradient);
        }

        /* Fiocco Oro Premium */
        .box-ribbon {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 35px;
            z-index: 10;
        }

        .box-ribbon::before, .box-ribbon::after {
            content: '';
            position: absolute;
            width: 38px;
            height: 28px;
            background: var(--gold-gradient);
            border-radius: 50% 50% 10% 50%;
            border: 1.5px solid rgba(0,0,0,0.1);
        }

        .box-ribbon::before {
            left: -8px;
            transform: rotate(-15deg);
        }

        .box-ribbon::after {
            right: -8px;
            transform: rotate(105deg);
            border-radius: 50% 50% 50% 10%;
        }

        /* ---------------------------------------------------------------------
           [SECTION 8] - VOUCHER E QR CODE
           ---------------------------------------------------------------------
        */
        .voucher-wrap { text-align: center; }
        .v-biz-name { font-family: 'Comfortaa', cursive; font-size: 2.6rem; color: var(--primary-teal); font-weight: 700; margin-bottom: 5px; }
        .v-user-welcome { font-weight: 700; color: var(--slate-gray); font-size: 1.2rem; margin-bottom: 30px; }

        .dots-grid { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .fidelity-point { width: 30px; height: 30px; border-radius: 50%; border: 2.5px solid var(--premium-gold); position: relative; }
        .fidelity-point.filled { background: var(--premium-gold); transform: scale(1.2); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .fidelity-point.filled::after { content: '✓'; color: white; font-size: 14px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; }

        .qr-output-box { margin: 35px auto; padding: 20px; background: white; display: inline-block; border-radius: var(--radius-md); border: 1px solid #f1f5f9; box-shadow: var(--shadow-md); }

        /* Toast e Notifiche */
        .toast-system { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--dark-text); color: white; padding: 15px 30px; border-radius: 50px; font-weight: 700; display: none; z-index: 9999; }

        .footer-branding { padding: 50px 20px; text-align: center; margin-top: auto; }
        .footer-branding p { font-size: 0.7rem; color: var(--slate-gray); font-weight: 800; text-transform: uppercase; letter-spacing: 3px; }

    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="header-main">
            <h1 class="brand-logo">SPICH<span>.</span></h1>
            <p class="brand-sub">Premium Network</p>
            <div id="display-dash-biz-name" class="biz-display-header" style="display:none;"></div>
        </header>

        <div id="sys-toast" class="toast-system">Azione eseguita</div>

        <main id="view-setup" class="view-scene">
            <div class="card-ui">
                <h3 style="margin-bottom:25px; color:var(--primary-teal); font-weight:800;">Attivazione Account</h3>
                <div class="field-group">
                    <label class="field-label">Nome Attività</label>
                    <input type="text" id="setup-name" placeholder="Esempio: Studio Spich">
                </div>
                <div class="field-group">
                    <label class="field-label">WhatsApp Business</label>
                    <input type="tel" id="setup-phone" placeholder="3331234567">
                </div>
                <div class="field-group">
                    <label class="field-label">Settore</label>
                    <select id="setup-type">
                        <option value="Salute">Settore Sanitario</option>
                        <option value="Ristorazione">Food & Beverage</option>
                        <option value="Wellness">Benessere & Estetica</option>
                    </select>
                </div>
                <button class="btn-action btn-primary" onclick="initBusinessProfile()">ATTIVA ORA <i class="fas fa-check-circle"></i></button>
            </div>
        </main>

        <main id="view-dash" class="view-scene">
            <div class="counter-display">
                <div class="counter-number" id="stats-total">0</div>
                <div class="counter-label" id="stats-label">Database Cloud</div>
            </div>

            <div class="card-ui">
                <div class="field-group">
                    <label class="field-label" id="label-client-name">Nome Completo</label>
                    <input type="text" id="new-client-name" placeholder="Cognome e Nome">
                </div>
                <div class="field-group">
                    <label class="field-label">WhatsApp Cliente</label>
                    <input type="tel" id="new-client-tel" placeholder="3XXXXXXXXX">
                </div>
                <button id="btn-submit-main" class="btn-action btn-primary" onclick="registerNewPatient()">CREA PASS REGALO <i class="fas fa-plus-circle"></i></button>
            </div>

            <div id="main-list-render" class="list-container"></div>
        </main>

        <main id="view-voucher" class="view-scene">
            <div class="voucher-wrap">
                
                <div class="gift-wrapper">
                    <div class="box-ribbon"></div>
                    <div class="box-body"></div>
                </div>

                <h2 id="display-biz-name" class="v-biz-name">STUDIO</h2>
                <p id="display-user-name" class="v-user-welcome">Benvenuto</p>

                <div class="dots-grid" id="display-dots-ui">
                    <div class="fidelity-point"></div>
                    <div class="fidelity-point"></div>
                    <div class="fidelity-point"></div>
                    <div class="fidelity-point"></div>
                    <div class="fidelity-point"></div>
                </div>

                <div class="qr-output-box">
                    <div id="qrcode-canvas"></div>
                </div>

                <button class="btn-action btn-gold" onclick="shareVoucherLink()">REGALA SCONTO A UN AMICO <i class="fab fa-whatsapp"></i></button>
            </div>
        </main>

        <footer class="footer-branding">
            <p>&copy; 2026 SPICH. DIGITAL NETWORK</p>
            <div id="debug-info" style="font-size:0.5rem; color:#cbd5e1; margin-top:10px;"></div>
        </footer>

    </div>

    <script>
        /**
         * =====================================================================
         * CONFIGURAZIONE SISTEMA E LOGICA CLOUD
         * =====================================================================
         */
        const GOOGLE_ENDPOINT = "https://script.google.com/macros/s/AKfycbyh4CGnWQWyvztKvTkbQ9_TOUMb3EQaB6bZySuamZeRkYSe_1VBvWJYXc2LcESKWS1sdg/exec";
        
        let state = {
            deviceID: localStorage.getItem('spich_v18_device_id') || generateUID(),
            bizProfile: JSON.parse(localStorage.getItem('spich_v18_biz_data') || 'null'),
            patientDb: JSON.parse(localStorage.getItem('spich_v18_db') || '[]')
        };

        window.addEventListener('DOMContentLoaded', async () => {
            localStorage.setItem('spich_v18_device_id', state.deviceID);
            document.getElementById('debug-info').innerText = "SESSION ID: " + state.deviceID;
            
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.get('v') === 'gift') {
                initVoucherMode(urlParams);
            } else if (!state.bizProfile) {
                navigateTo('setup');
            } else {
                navigateTo('dash');
                const bizTitle = document.getElementById('display-dash-biz-name');
                bizTitle.innerText = state.bizProfile.name;
                bizTitle.style.display = 'block';
                
                applyTerminology();
                await checkCloudStatus(); // <--- LOGICA DI CONTROLLO REMOTO
                refreshPatientUI();
            }
        });

        /**
         * LOGICA DI CONTROLLO REMOTO (KILL-SWITCH)
         * Se cancelli l'esercente dallo script, l'app si resetta.
         */
        async function checkCloudStatus() {
            try {
                const response = await fetch(`${GOOGLE_ENDPOINT}?checkPro=${state.deviceID}`);
                const cloudData = await response.json();

                // Se lo script ritorna che l'ID non esiste più o è rimosso
                if (cloudData.status === "UNAUTHORIZED" || cloudData.status === "DELETED" || !cloudData.exists) {
                    console.log("Account rimosso remotamente.");
                    triggerToast("Account disattivato.");
                    setTimeout(() => {
                        localStorage.clear();
                        location.reload();
                    }, 2000);
                }
            } catch (err) {
                console.warn("Cloud connection error, procedo offline.");
            }
        }

        function generateUID() {
            return 'SP-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        function navigateTo(sceneId) {
            document.querySelectorAll('.view-scene').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + sceneId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function triggerToast(message) {
            const toast = document.getElementById('sys-toast');
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2800);
        }

        /**
         * LOGICA DI SETUP INIZIALE
         */
        function initBusinessProfile() {
            const nameValue = document.getElementById('setup-name').value.trim();
            const phoneValue = document.getElementById('setup-phone').value.trim();
            const sectorValue = document.getElementById('setup-type').value;

            if (!nameValue || !phoneValue) {
                alert("Tutti i campi sono obbligatori.");
                return;
            }

            state.bizProfile = {
                name: nameValue,
                phone: '39' + phoneValue.replace(/\D/g, ''),
                sector: sectorValue
            };

            localStorage.setItem('spich_v18_biz_data', JSON.stringify(state.bizProfile));

            fetch(GOOGLE_ENDPOINT, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    t: "REG_BIZ", id: state.deviceID, nome: nameValue, settore: sectorValue
                })
            });

            triggerToast("Network Attivato!");
            setTimeout(() => { location.reload(); }, 1200);
        }

        function applyTerminology() {
            if (!state.bizProfile) return;
            const maps = {
                "Ristorazione": { plural: "Ospiti nel Cloud", singular: "Nome Ospite" },
                "Wellness": { plural: "Clienti nel Cloud", singular: "Nome Cliente" },
                "Salute": { plural: "Pazienti nel Cloud", singular: "Nome Paziente" }
            };
            const selected = maps[state.bizProfile.sector] || maps["Salute"];
            document.getElementById('stats-label').innerText = selected.plural;
            document.getElementById('label-client-name').innerText = selected.singular;
        }

        /**
         * REGISTRAZIONE E GESTIONE PAZIENTI
         */
        function registerNewPatient() {
            const cName = document.getElementById('new-client-name').value.trim();
            const cTel = document.getElementById('new-client-tel').value.trim();

            if (!cName || !cTel) {
                alert("Nome e Cellulare richiesti.");
                return;
            }

            const uniqueCID = 'CID-' + Date.now().toString(36).toUpperCase();
            const patientRecord = {
                cid: uniqueCID,
                nome: cName,
                tel: '39' + cTel.replace(/\D/g, ''),
                pts: 0
            };

            state.patientDb.unshift(patientRecord);
            localStorage.setItem('spich_v18_db', JSON.stringify(state.patientDb));

            fetch(GOOGLE_ENDPOINT, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    t: "ADD_CLIENT",
                    bizId: state.deviceID,
                    bizName: state.bizProfile.name,
                    clientName: cName,
                    clientTel: patientRecord.tel,
                    cid: uniqueCID,
                    pts: 0
                })
            });

            triggerToast("Pass Creato!");
            refreshPatientUI();
            document.getElementById('new-client-name').value = "";
            document.getElementById('new-client-tel').value = "";
        }

        function refreshPatientUI() {
            const listArea = document.getElementById('main-list-render');
            listArea.innerHTML = "";
            document.getElementById('stats-total').innerText = state.patientDb.length;

            state.patientDb.forEach((entry, i) => {
                const element = document.createElement('div');
                element.className = 'row-item';
                const whatsappUrl = buildWhatsAppMessage(entry);
                element.innerHTML = `
                    <div class="row-info">
                        <b>${entry.nome}</b>
                        <span>${entry.pts} Punti Registrati</span>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <a href="${whatsappUrl}" target="_blank" class="tool-btn btn-wa-action">
                            <i class="fab fa-whatsapp"></i>
                        </a>
                        <button class="tool-btn btn-pts-action" onclick="updatePoints(${i})">+1</button>
                    </div>
                `;
                listArea.appendChild(element);
            });
        }

        function updatePoints(index) {
            state.patientDb[index].pts++;
            localStorage.setItem('spich_v18_db', JSON.stringify(state.patientDb));
            fetch(GOOGLE_ENDPOINT, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    t: "UPDATE_POINTS",
                    bizId: state.deviceID,
                    cid: state.patientDb[index].cid,
                    pts: state.patientDb[index].pts
                })
            });
            triggerToast("Punto Registrato!");
            refreshPatientUI();
        }

        function buildWhatsAppMessage(patient) {
            const root = window.location.href.split('?')[0];
            const voucherParams = `?v=gift&st=${encodeURIComponent(state.bizProfile.name)}&n=${encodeURIComponent(patient.nome)}&cid=${patient.cid}`;
            const text = `Ciao ${patient.nome}! 🎉 Ecco il tuo Pass Regalo di ${state.bizProfile.name}: ${root + voucherParams}`;
            return `https://wa.me/${patient.tel}?text=${encodeURIComponent(text)}`;
        }

        /**
         * VISTA VOUCHER (LATO CLIENTE)
         */
        async function initVoucherMode(params) {
            navigateTo('voucher');
            document.getElementById('display-biz-name').innerText = params.get('st');
            document.getElementById('display-user-name').innerText = "Ciao, " + params.get('n');

            new QRCode(document.getElementById("qrcode-canvas"), {
                text: window.location.href,
                width: 170, height: 170,
                colorDark: "#003366", colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            try {
                const cloudRes = await fetch(`${GOOGLE_ENDPOINT}?getCid=${params.get('cid')}`);
                const data = await cloudRes.json();
                const currentPoints = parseInt(data.pts || 0);
                const dotElements = document.querySelectorAll('.fidelity-point');
                for (let j = 0; j < currentPoints && j < 5; j++) {
                    dotElements[j].classList.add('filled');
                }
            } catch (error) {}
        }

        function shareVoucherLink() {
            const currentParams = new URLSearchParams(window.location.search);
            const msgToShare = `Ehi! Guarda questo regalo che ho ricevuto da ${currentParams.get('st')}! Pass: ${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msgToShare)}`);
        }

    </script>
</body>
</html>
