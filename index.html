<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Business System & Referral</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* ==============================================
           1. DESIGN SYSTEM COMPLETO (600 RIGHE PROMISE)
           ============================================== */
        :root { 
            --primary: #008080; 
            --gold: #d4af37; 
            --bg: #fdfdfd; 
            --danger: #e74c3c; 
            --success: #2ecc71; 
            --wa: #25D366; 
            --light-blue: #E1F5FE;
            --shadow-main: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: #f0f2f5; 
            font-family: 'Montserrat', sans-serif; 
            color: #2c3e50; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        .app-container { 
            background: var(--bg); 
            width: 100%; 
            min-height: 100vh; 
            max-width: 480px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.15); 
            position: relative;
        }
        
        /* HEADER */
        .header { 
            padding: 30px 20px; 
            text-align: center; 
            background: white; 
            border-bottom: 1px solid #f0f0f0; 
            cursor: pointer; 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo { 
            font-family: 'Comfortaa', cursive; 
            font-size: 3.2rem; 
            color: var(--primary); 
            letter-spacing: -2px;
        }
        
        .logo span { color: var(--gold); }
        
        /* SCENE ANIMATE */
        .scena { 
            display: none; 
            padding: 25px; 
            animation: fadeInScene 0.4s ease-out; 
            flex: 1;
        }
        
        .active { display: block !important; }
        
        @keyframes fadeInScene { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* DASHBOARD CARDS */
        .stat-card { 
            background: white; 
            padding: 40px 20px; 
            border-radius: 30px; 
            text-align: center; 
            border-bottom: 8px solid var(--gold); 
            margin-bottom: 30px; 
            position: relative; 
            box-shadow: var(--shadow-main); 
        }
        
        .stat-card b { 
            font-size: 3.8rem; 
            color: var(--primary); 
            display: block; 
            line-height: 1;
        }

        .stat-card span {
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        
        .badge-pro { 
            background: #cbd5e0; 
            color: white; 
            padding: 6px 16px; 
            border-radius: 12px; 
            font-size: 0.75rem; 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            font-weight: 900; 
        }
        
        .badge-pro.is-pro { background: var(--success); }
        
        /* FORM E INPUT */
        .form-box { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            border: 1px solid #f1f5f9; 
            margin-bottom: 30px; 
        }
        
        label { 
            font-size: 0.75rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 20px 0 8px 5px; 
            display: block; 
        }
        
        input, select { 
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            border: 1px solid #e2e8f0; 
            font-family: inherit; 
            font-size: 1.05rem; 
            outline: none; 
            background: #fbfcfd;
        }

        .btn-teal { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 22px; 
            border-radius: 20px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            font-size: 1.2rem; 
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(0,128,128,0.2);
        }

        /* LISTA CONTATTI */
        .p-item { 
            background: white; 
            padding: 22px; 
            border-radius: 24px; 
            margin-bottom: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #f1f5f9; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        
        .btn-wa { 
            background: var(--wa); 
            color: white; 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
            font-size: 1.8rem; 
        }
        
        .btn-ref { 
            background: var(--gold); 
            border: none; 
            padding: 15px 25px; 
            border-radius: 16px; 
            color: white; 
            font-weight: 900; 
            cursor: pointer; 
        }

        /* BANNER LIMITI */
        .lock-box { 
            background: #fffafa; 
            border: 2px dashed #feb2b2; 
            border-radius: 25px; 
            padding: 30px; 
            text-align: center; 
            display: none; 
            margin-top: 20px;
        }

        /* AREA REGALO E PALLINI */
        .dots-wrapper { 
            display: flex; 
            justify-content: center; 
            gap: 18px; 
            margin: 40px 0; 
        }
        
        .dot { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border: 3px solid #e2e8f0; 
            background: #f8fafc; 
            transition: all 0.4s ease;
        }
        
        .dot.fill { 
            background: var(--primary); 
            border-color: var(--primary); 
            transform: scale(1.3); 
            box-shadow: 0 0 15px rgba(0,128,128,0.3); 
        }

        .btn-share-wa { 
            background: var(--light-blue); 
            color: #0288D1; 
            border: none; 
            padding: 20px; 
            border-radius: 18px; 
            width: 100%; 
            font-weight: 800; 
            margin-top: 25px; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px; 
        }

        .banner-premio { 
            background: var(--gold); 
            color: white; 
            padding: 30px; 
            border-radius: 25px; 
            font-weight: 800; 
            text-align: center; 
            margin-top: 40px; 
            font-size: 1.2rem; 
        }

        #qrcode { 
            display: flex; 
            justify-content: center; 
            margin-top: 20px; 
        }
        
        #qrcode canvas, #qrcode img { 
            border: 10px solid white; 
            border-radius: 15px; 
            box-shadow: var(--shadow-main);
        }

        .footer { 
            font-size: 0.6rem; 
            color: #cbd5e0; 
            text-align: center; 
            padding: 25px; 
            margin-top: auto; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header class="header" onclick="confermaLogout()">
        <h1 class="logo">SPICH<span>.</span></h1>
    </header>

    <main id="scena-setup" class="scena">
        <div style="text-align:center; margin-bottom:30px;">
            <h3 style="color:var(--primary); font-weight:900; font-size:1.6rem;">Benvenuto</h3>
            <p style="color:#64748b;">Configura il tuo pannello referral.</p>
        </div>
        
        <div class="form-box">
            <label>Nome Attività</label>
            <input type="text" id="setup-nome" placeholder="Es: Studio Medico Rossi">
            
            <label>WhatsApp Business (con 39)</label>
            <input type="tel" id="setup-wa" placeholder="393471234567">
            
            <label>Settore</label>
            <select id="setup-settore">
                <option value="Medica">Area Medica</option>
                <option value="Commerciale">Area Commerciale</option>
                <option value="Ristorazione">Ristorazione</option>
                <option value="Altro">Altro</option>
            </select>
            
            <button class="btn-teal" onclick="eseguiSetup()">ATTIVA BUSINESS</button>
        </div>
    </main>

    <main id="scena-dash" class="scena">
        <div class="stat-card">
            <div id="badge-pro" class="badge-pro">FREE VERSION</div>
            <b id="contatore-num">0</b>
            <span id="label-plurale">PAZIENTI</span>
        </div>
        
        <div class="form-box">
            <label id="label-singolare">NOME E COGNOME</label>
            <input type="text" id="p-nome" placeholder="Nome...">
            
            <label>CELLULARE</label>
            <input type="tel" id="p-tel" placeholder="39...">
            
            <label>PREMIO D'INGRESSO</label>
            <select id="p-premio" onchange="togglePremioCustom()">
                <option value="Sconto 20%">Sconto 20%</option>
                <option value="Sconto 50%">Sconto 50%</option>
                <option value="Omaggio">Omaggio</option>
                <option value="CUSTOM">-- Scrivi Premio (PRO) --</option>
            </select>
            
            <input type="text" id="p-custom" placeholder="Descrivi premio..." style="display:none; margin-top:15px;">
            
            <button id="btn-salva" class="btn-teal" onclick="creaNuovoContatto()">AGGIUNGI ORA</button>
            
            <div id="area-limite" class="lock-box">
                <i class="fas fa-crown" style="color:var(--gold); font-size:2rem;"></i>
                <p style="color:var(--danger); font-weight:900; margin-top:10px;">LIMITE RAGGIUNTO (10/10)</p>
                <button onclick="invioRichiestaPro()" style="background:var(--danger); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:800; margin-top:10px; cursor:pointer;">PASSA A PRO</button>
            </div>
        </div>
        
        <div id="lista-render"></div>
    </main>

    <main id="scena-regalo" class="scena">
        <div style="text-align:center;">
            <i class="fas fa-gift" style="font-size:5rem; color:var(--primary); margin-bottom:20px;"></i>
            <h2 id="view-studio" style="color:var(--primary); text-transform:uppercase;"></h2>
            <p style="font-weight:700; color:#475569; margin-top:5px;">Ti ha fatto un regalo speciale!</p>
            
            <div class="dots-wrapper">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>

            <div id="area-qr-display">
                <div id="qrcode"></div>
                <button class="btn-share-wa" onclick="condividiPassWA()">
                    <i class="fab fa-whatsapp"></i> INVITA UN AMICO
                </button>
            </div>

            <div id="banner-info-premio" class="banner-premio"></div>
            
            <div id="box-sbloccato" style="display:none; margin-top:30px;">
                <p style="color:var(--success); font-weight:900;">VOUCHER SBLOCCATO!</p>
                <button class="btn-teal" onclick="contattaAttivita()">PRENOTA ORA</button>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        SPICH. BUSINESS SYSTEM v3.0<br>
        DEVICE ID: <span id="id-display">CARICAMENTO...</span><br>
        &copy; 2026 TUTTI I DIRITTI RISERVATI
    </footer>
</div>

<script>
    /* ==============================================
       LOGICA DI AVVIO BLINDATA
       ============================================== */
    
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyL97dtvTa7WzRFGpXSFcxgNYlpn844ft-ZQA49bBLhjDe5qzQ_26rYU9XtViMZr36zFA/exec";

    // Variabili Globali
    let myId = localStorage.getItem('spich_id') || ('SP-' + Math.random().toString(36).substr(2,6).toUpperCase());
    localStorage.setItem('spich_id', myId);

    let config = { n: "", w: "", s: "Medica" };
    let lista = [];
    let isPro = false;

    // Funzione per cambiare scena (Sposta fuori da window.onload per sicurezza)
    function switchScena(id) {
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active'));
        const target = document.getElementById('scena-' + id);
        if(target) target.classList.add('active');
        window.scrollTo(0,0);
    }

    // CARICAMENTO INIZIALE
    window.onload = function() {
        try {
            document.getElementById('id-display').innerText = myId;
            
            // 1. Leggi Dati Locali
            const rawCfg = localStorage.getItem('spich_cfg');
            if(rawCfg) config = JSON.parse(rawCfg);
            
            const rawList = localStorage.getItem('spich_list');
            if(rawList) lista = JSON.parse(rawList);

            // 2. Controllo URL (Paziente o Esercente)
            const params = new URLSearchParams(window.location.search);
            if (params.get('v') === 'gift') {
                switchScena('regalo');
                initGift(params);
            } else if (!config.n) {
                switchScena('setup');
            } else {
                switchScena('dash');
                refreshDash();
                checkServerPro();
            }
        } catch(e) {
            console.error("Errore critico avvio:", e);
            alert("Errore di caricamento. L'app verrà resettata.");
            localStorage.clear();
            location.reload();
        }
    };

    // --- FUNZIONI DASHBOARD ---
    function refreshDash() {
        const area = document.getElementById('lista-render');
        area.innerHTML = "";
        
        lista.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'p-item';
            item.innerHTML = `
                <div style="flex:1;">
                    <b style="color:var(--primary);">${p.nome}</b><br>
                    <small>${p.ref}/5 Punti</small>
                </div>
                <div style="display:flex; gap:10px;">
                    <a class="btn-wa" href="${generaLink(p)}" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <button class="btn-ref" onclick="addPunto(${i})">+1</button>
                </div>
            `;
            area.appendChild(item);
        });

        document.getElementById('contatore-num').innerText = lista.length;
        document.getElementById('label-plurale').innerText = (config.s === "Medica") ? "PAZIENTI" : "CLIENTI";
        document.getElementById('label-singolare').innerText = (config.s === "Medica") ? "NOME E COGNOME" : "NOME CLIENTE";

        // Logic Banner PRO
        const boxLim = document.getElementById('area-limite');
        const btnAdd = document.getElementById('btn-salva');
        if (!isPro && lista.length >= 10) {
            boxLim.style.display = "block";
            btnAdd.style.display = "none";
        } else {
            boxLim.style.display = "none";
            btnAdd.style.display = "block";
        }
    }

    function creaNuovoContatto() {
        const n = document.getElementById('p-nome').value.trim();
        const t = document.getElementById('p-tel').value.trim();
        let pr = document.getElementById('p-premio').value;
        if(pr === 'CUSTOM') pr = document.getElementById('p-custom').value.trim();

        if(!n || !t) return alert("Inserisci Nome e Cellulare!");

        lista.push({ id: 'R'+Date.now(), nome: n, tel: t, premio: pr, ref: 0 });
        localStorage.setItem('spich_list', JSON.stringify(lista));
        
        document.getElementById('p-nome').value = "";
        document.getElementById('p-tel').value = "";
        refreshDash();
    }

    function addPunto(i) {
        lista[i].ref++;
        localStorage.setItem('spich_list', JSON.stringify(lista));
        refreshDash();
    }

    function generaLink(p) {
        const base = window.location.href.split('?')[0];
        const final = `${base}?v=gift&id=${p.id}&n=${encodeURIComponent(p.nome)}&st=${encodeURIComponent(config.n)}&wa=${config.w}&pr=${encodeURIComponent(p.premio)}&ref=${p.ref}`;
        return `https://wa.me/${p.tel}?text=${encodeURIComponent("Ciao " + p.nome + "! Ecco il tuo pass punti per " + config.n + ": " + final)}`;
    }

    // --- FUNZIONI REGALO ---
    function initGift(p) {
        document.getElementById('view-studio').innerText = p.get('st') || "BUSINESS";
        document.getElementById('banner-info-premio').innerText = "IL TUO PREMIO: " + (p.get('pr') || "Sconto");
        
        const r = parseInt(p.get('ref') || 0);
        const pallini = document.querySelectorAll('.dot');
        for(let i=0; i<r && i<5; i++) {
            pallini[i].classList.add('fill');
        }

        if (r >= 5) {
            document.getElementById('area-qr-display').style.display = "none";
            document.getElementById('box-sbloccato').style.display = "block";
        } else {
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 170,
                height: 170
            });
        }
    }

    function condividiPassWA() {
        const msg = "Ehi! Guarda che regalo ho ricevuto, clicca qui: " + window.location.href;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function contattaAttivita() {
        const p = new URLSearchParams(window.location.search);
        window.open(`https://wa.me/${p.get('wa')}?text=Ho completato i 5 punti!`);
    }

    // --- SETUP E UTILITY ---
    function eseguiSetup() {
        const n = document.getElementById('setup-nome').value.trim();
        const w = document.getElementById('setup-wa').value.trim();
        if(!n || !w) return alert("Dati incompleti!");
        
        config = { n, w, s: document.getElementById('setup-settore').value };
        localStorage.setItem('spich_cfg', JSON.stringify(config));
        location.reload();
    }

    async function checkServerPro() {
        try {
            const res = await fetch(SCRIPT_URL + "?checkPro=" + myId);
            const data = await res.json();
            if(data.isPro === "SI") {
                isPro = true;
                document.getElementById('badge-pro').innerText = "PRO VERSION";
                document.getElementById('badge-pro').classList.add('is-pro');
                refreshDash();
            }
        } catch(e) {}
    }

    function togglePremioCustom() {
        document.getElementById('p-custom').style.display = (document.getElementById('p-premio').value === 'CUSTOM') ? 'block' : 'none';
    }

    function confermaLogout() {
        if(confirm("Vuoi resettare i dati?")) { localStorage.clear(); location.reload(); }
    }
</
