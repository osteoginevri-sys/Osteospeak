<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Premium Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* =====================================================================
           [SECTION 1] - DESIGN SYSTEM & VARIABLES
           =====================================================================
        */
        :root { 
            --primary-teal: #008080; 
            --dark-teal: #006666;
            --premium-gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #fbf5b7 0%, #d4af37 50%, #a67c00 100%);
            --deep-blue: #003366; 
            --soft-gold: #f4e3b1;
            --pure-white: #ffffff;
            --bg-canvas: #f8fafc;
            --slate-gray: #64748b;
            --dark-text: #1e293b;
            --danger-red: #ef4444;
            --success-green: #10b981;
            
            /* Elevation & Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
            
            /* Border Radius */
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        /* =====================================================================
           [SECTION 2] - RESET & BOILERPLATE
           =====================================================================
        */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            height: 100%;
            background: var(--bg-canvas);
            font-family: 'Montserrat', sans-serif;
            color: var(--dark-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
        }

        /* =====================================================================
           [SECTION 3] - CORE LAYOUT (CONTAINER CON CORNICETTE)
           =====================================================================
        */
        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: var(--pure-white);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.03);
            
            /* Cornicette laterali eleganti stabilite */
            border-left: 5px solid var(--premium-gold);
            border-right: 5px solid var(--premium-gold);
        }

        /* =====================================================================
           [SECTION 4] - HEADER & BRANDING
           =====================================================================
        */
        .header-main {
            padding: 60px 20px 20px;
            text-align: center;
        }

        .brand-logo {
            font-family: 'Comfortaa', cursive;
            font-size: 3.5rem;
            color: var(--primary-teal);
            font-weight: 700;
            letter-spacing: -3px;
            display: inline-block;
        }

        .brand-logo span {
            color: var(--premium-gold);
        }

        .brand-sub {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--slate-gray);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: -5px;
            margin-bottom: 20px;
        }

        .biz-display-header {
            font-weight: 800;
            color: var(--premium-gold);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        /* =====================================================================
           [SECTION 5] - VIEW CONTROLLER (SCENES)
           =====================================================================
        */
        .view-scene {
            display: none;
            padding: 30px;
            flex-direction: column;
            animation: fadeInTransition 0.4s ease-out;
        }

        .view-scene.active {
            display: flex;
        }

        @keyframes fadeInTransition {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =====================================================================
           [SECTION 6] - UI COMPONENTS (INPUTS, BUTTONS, CARDS)
           =====================================================================
        */
        .card-ui {
            background: var(--pure-white);
            padding: 25px;
            border-radius: var(--radius-lg);
            border: 2px solid var(--soft-gold); 
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
            position: relative;
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--primary-teal);
            margin-bottom: 10px;
            margin-left: 4px;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 18px 22px;
            border-radius: var(--radius-md);
            border: 2px solid #f1f5f9;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--dark-text);
            background: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary-teal);
            background: var(--pure-white);
            box-shadow: 0 0 0 5px rgba(0, 128, 128, 0.08);
        }

        .btn-action {
            width: 100%;
            padding: 22px;
            border-radius: var(--radius-md);
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: var(--shadow-md);
        }

        .btn-primary { background: var(--primary-teal); color: var(--pure-white); }
        .btn-gold { background: var(--premium-gold); color: var(--pure-white); }

        /* =====================================================================
           [SECTION 7] - IL PACCO REGALO MASTER (TEAL/ORO CON FIOCCO)
           =====================================================================
        */
        .gift-box-scene {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 30px;
            animation: giftFloat 3s ease-in-out infinite;
        }

        @keyframes giftFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .box-base {
            position: absolute;
            bottom: 0;
            left: 15px;
            width: 100px;
            height: 85px;
            background: var(--primary-teal);
            border-radius: 12px;
            border: 3px solid var(--premium-gold);
            z-index: 2;
        }

        /* Nastro Oro Verticale */
        .box-base::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 100%;
            background: var(--gold-gradient);
        }

        /* Nastro Oro Orizzontale */
        .box-base::after {
            content: '';
            position: absolute;
            top: 35%;
            width: 100%;
            height: 14px;
            background: var(--gold-gradient);
        }

        /* Fiocco Superiore */
        .box-top-ribbon {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 35px;
            z-index: 5;
        }

        .box-top-ribbon::before,
        .box-top-ribbon::after {
            content: '';
            position: absolute;
            width: 38px;
            height: 28px;
            background: var(--gold-gradient);
            border-radius: 50% 50% 10% 50%;
            border: 1.5px solid rgba(0,0,0,0.1);
        }

        .box-top-ribbon::before { left: -8px; transform: rotate(-15deg); }
        .box-top-ribbon::after { right: -8px; transform: rotate(105deg); border-radius: 50% 50% 50% 10%; }

        /* =====================================================================
           [SECTION 8] - DASHBOARD & LISTS
           =====================================================================
        */
        .counter-display { text-align: center; padding: 40px 0; }
        .counter-number { font-size: 5rem; font-weight: 800; color: var(--primary-teal); line-height: 1; }
        .counter-label { font-weight: 700; color: var(--slate-gray); text-transform: uppercase; letter-spacing: 3px; font-size: 0.85rem; }

        .row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            background: var(--pure-white);
            border: 1px solid #f1f5f9;
            border-radius: var(--radius-md);
            margin-bottom: 15px;
            transition: 0.3s ease;
        }

        .row-info b { color: var(--primary-teal); font-size: 1.1rem; display: block; }
        .row-info span { color: var(--slate-gray); font-size: 0.85rem; font-weight: 600; }

        .tool-btn {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white; font-size: 1.2rem;
        }

        .btn-wa-action { background: #25D366; }
        .btn-pts-action { background: var(--premium-gold); font-weight: 900; }

        /* =====================================================================
           [SECTION 9] - FIDELITY DOTS & QR
           =====================================================================
        */
        .dots-grid { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .fidelity-point { width: 30px; height: 30px; border-radius: 50%; border: 2.5px solid var(--premium-gold); position: relative; }
        .fidelity-point.filled { background: var(--premium-gold); transform: scale(1.2); }
        .fidelity-point.filled::after { content: '✓'; color: white; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-weight: 900; }
        
        .qr-output-box { margin: 35px auto; padding: 20px; background: white; border-radius: var(--radius-md); border: 1px solid #f1f5f9; }

        .toast-system {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--dark-text); color: white; padding: 15px 30px;
            border-radius: 50px; font-weight: 700; display: none; z-index: 9999;
        }

        /* =====================================================================
           [SECTION 10] - FOOTER
           =====================================================================
        */
        .footer-branding { padding: 50px 20px; text-align: center; margin-top: auto; }
        .footer-branding p { font-size: 0.7rem; color: var(--slate-gray); font-weight: 800; text-transform: uppercase; letter-spacing: 3px; }

    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="header-main">
            <h1 class="brand-logo">SPICH<span>.</span></h1>
            <p class="brand-sub">Premium Network</p>
            <div id="display-dash-biz-name" class="biz-display-header" style="display:none;"></div>
        </header>

        <div id="sys-toast" class="toast-system">Azione eseguita</div>

        <main id="view-setup" class="view-scene">
            <div class="card-ui">
                <h3 style="margin-bottom:25px; color:var(--primary-teal); font-weight:800;">Attivazione Account</h3>
                <div class="field-group">
                    <label class="field-label">Nome Attività</label>
                    <input type="text" id="setup-name" placeholder="Esempio: Studio Medico Rossi">
                </div>
                <div class="field-group">
                    <label class="field-label">WhatsApp Business</label>
                    <input type="tel" id="setup-phone" placeholder="333...">
                </div>
                <div class="field-group">
                    <label class="field-label">Settore</label>
                    <select id="setup-type">
                        <option value="Salute">Settore Sanitario</option>
                        <option value="Ristorazione">Food & Beverage</option>
                        <option value="Wellness">Benessere & Estetica</option>
                    </select>
                </div>
                <button class="btn-action btn-primary" onclick="initBusinessProfile()">ATTIVA ORA <i class="fas fa-check-circle"></i></button>
            </div>
        </main>

        <main id="view-dash" class="view-scene">
            <div class="counter-display">
                <div class="counter-number" id="stats-total">0</div>
                <div class="counter-label" id="stats-label">Pazienti nel Cloud</div>
            </div>
            <div class="card-ui">
                <div class="field-group">
                    <label class="field-label" id="label-client-name">Nome Paziente</label>
                    <input type="text" id="new-client-name" placeholder="Cognome e Nome">
                </div>
                <div class="field-group">
                    <label class="field-label">WhatsApp Cliente</label>
                    <input type="tel" id="new-client-tel" placeholder="3XXXXXXXXX">
                </div>
                <button class="btn-action btn-primary" onclick="registerNewPatient()">CREA PASS REGALO <i class="fas fa-plus-circle"></i></button>
            </div>
            <div id="main-list-render" class="list-container"></div>
        </main>

        <main id="view-voucher" class="view-scene">
            <div style="text-align:center;">
                <div class="gift-box-scene">
                    <div class="box-top-ribbon"></div>
                    <div class="box-base"></div>
                </div>
                <h2 id="display-biz-name" style="font-family:'Comfortaa'; color:var(--primary-teal); font-size:2.6rem;"></h2>
                <p id="display-user-name" style="font-weight:700; color:var(--slate-gray); font-size:1.2rem;"></p>
                <div class="dots-grid" id="display-dots-ui">
                    <div class="fidelity-point"></div><div class="fidelity-point"></div><div class="fidelity-point"></div><div class="fidelity-point"></div><div class="fidelity-point"></div>
                </div>
                <div class="qr-output-box">
                    <div id="qrcode-canvas"></div>
                </div>
                <button class="btn-action btn-gold" onclick="shareVoucherLink()">REGALA SCONTO A UN AMICO <i class="fab fa-whatsapp"></i></button>
            </div>
        </main>

        <footer class="footer-branding">
            <p>&copy; 2026 SPICH. DIGITAL NETWORK</p>
            <div id="debug-info" style="font-size:0.5rem; color:#cbd5e1; margin-top:10px;"></div>
        </footer>

    </div>

    <script>
        const GOOGLE_ENDPOINT = "https://script.google.com/macros/s/AKfycbyh4CGnWQWyvztKvTkbQ9_TOUMb3EQaB6bZySuamZeRkYSe_1VBvWJYXc2LcESKWS1sdg/exec";
        
        let state = {
            deviceID: localStorage.getItem('spich_v18_device_id') || ('SP-' + Math.random().toString(36).substr(2, 9).toUpperCase()),
            bizProfile: JSON.parse(localStorage.getItem('spich_v18_biz_data') || 'null'),
            patientDb: JSON.parse(localStorage.getItem('spich_v18_db') || '[]')
        };

        window.addEventListener('DOMContentLoaded', async () => {
            if(!localStorage.getItem('spich_v18_device_id')) localStorage.setItem('spich_v18_device_id', state.deviceID);
            document.getElementById('debug-info').innerText = "DEVICE ID: " + state.deviceID;
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.get('v') === 'gift') {
                initVoucherMode(urlParams);
            } else if (!state.bizProfile) {
                navigateTo('setup');
            } else {
                navigateTo('dash');
                const bizTitle = document.getElementById('display-dash-biz-name');
                bizTitle.innerText = state.bizProfile.name;
                bizTitle.style.display = 'block';
                applyTerminology();
                refreshPatientUI();
                await checkCloudStatus(); 
            }
        });

        async function checkCloudStatus() {
            if(!state.bizProfile) return;
            try {
                const response = await fetch(`${GOOGLE_ENDPOINT}?checkPro=${state.deviceID}`);
                const cloudData = await response.json();
                if (cloudData.status === "UNAUTHORIZED" || cloudData.exists === false) {
                    triggerToast("Account rimosso dal cloud.");
                    setTimeout(() => { localStorage.clear(); location.reload(); }, 2500);
                }
            } catch (err) { console.warn("Cloud offline."); }
        }

        function navigateTo(id) {
            document.querySelectorAll('.view-scene').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            window.scrollTo(0, 0);
        }

        function triggerToast(m) {
            const toast = document.getElementById('sys-toast');
            toast.innerText = m; toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2800);
        }

        function initBusinessProfile() {
            const n = document.getElementById('setup-name').value.trim();
            const p = document.getElementById('setup-phone').value.trim();
            const s = document.getElementById('setup-type').value;
            if(!n || !p) return alert("Inserire tutti i dati.");

            state.bizProfile = { name: n, phone: '39'+p.replace(/\D/g,''), sector: s };
            localStorage.setItem('spich_v18_biz_data', JSON.stringify(state.bizProfile));

            fetch(GOOGLE_ENDPOINT, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ t: "REG_BIZ", id: state.deviceID, nome: n, settore: s })
            });

            triggerToast("Network Attivato!");
            setTimeout(() => { location.reload(); }, 1200);
        }

        function registerNewPatient() {
            const n = document.getElementById('new-client-name').value.trim();
            const t = document.getElementById('new-client-tel').value.trim();
            if(!n || !t) return alert("Dati mancanti.");

            const cid = 'CID-' + Date.now().toString(36).toUpperCase();
            const rec = { cid, nome: n, tel: '39'+t.replace(/\D/g,''), pts: 0 };
            state.patientDb.unshift(rec);
            localStorage.setItem('spich_v18_db', JSON.stringify(state.patientDb));

            fetch(GOOGLE_ENDPOINT, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ t: "ADD_CLIENT", bizId: state.deviceID, bizName: state.bizProfile.name, clientName: n, clientTel: rec.tel, cid: cid })
            });

            triggerToast("Inviato!");
            refreshPatientUI();
            document.getElementById('new-client-name').value = "";
            document.getElementById('new-client-tel').value = "";
        }

        function refreshPatientUI() {
            const listArea = document.getElementById('main-list-render');
            listArea.innerHTML = "";
            document.getElementById('stats-total').innerText = state.patientDb.length;
            state.patientDb.forEach((p, i) => {
                const element = document.createElement('div');
                element.className = 'row-item';
                element.innerHTML = `<div class="row-info"><b>${p.nome}</b><span>${p.pts} Punti</span></div>
                    <div style="display:flex; gap:10px;">
                        <a href="${buildWa(p)}" target="_blank" class="tool-btn btn-wa-action"><i class="fab fa-whatsapp"></i></a>
                        <button class="tool-btn btn-pts-action" onclick="addPt(${i})">+1</button>
                    </div>`;
                listArea.appendChild(element);
            });
        }

        function addPt(i) {
            state.patientDb[i].pts++;
            localStorage.setItem('spich_v18_db', JSON.stringify(state.patientDb));
            fetch(GOOGLE_ENDPOINT, { method: "POST", mode: "no-cors", body: JSON.stringify({ t: "UPDATE_POINTS", bizId: state.deviceID, cid: state.patientDb[i].cid, pts: state.patientDb[i].pts }) });
            triggerToast("+1 Punto!");
            refreshPatientUI();
        }

        function buildWa(p) {
            const url = window.location.href.split('?')[0] + `?v=gift&st=${encodeURIComponent(state.bizProfile.name)}&n=${encodeURIComponent(p.nome)}&cid=${p.cid}`;
            return `https://wa.me/${p.tel}?text=${encodeURIComponent("Ciao " + p.nome + "! Ecco il tuo regalo: " + url)}`;
        }

        async function initVoucherMode(p) {
            navigateTo('voucher');
            document.getElementById('display-biz-name').innerText = p.get('st');
            document.getElementById('display-user-name').innerText = "Ciao, " + p.get('n');
            new QRCode(document.getElementById("qrcode-canvas"), { text: window.location.href, width: 160, height: 160 });
            try {
                const res = await fetch(`${GOOGLE_ENDPOINT}?getCid=${p.get('cid')}`);
                const data = await res.json();
                const pts = parseInt(data.pts || 0);
                const dots = document.querySelectorAll('.fidelity-point');
                for (let j = 0; j < pts && j < 5; j++) dots[j].classList.add('filled');
            } catch (e) {}
        }

        function applyTerminology() {
            const maps = { "Ristorazione": "Ospiti", "Wellness": "Clienti", "Salute": "Pazienti" };
            document.getElementById('stats-label').innerText = maps[state.bizProfile.sector] || "Utenti";
        }

        function shareVoucherLink() {
            const p = new URLSearchParams(window.location.search);
            window.open(`https://wa.me/?text=${encodeURIComponent("Guarda che regalo da " + p.get('st') + ": " + window.location.href)}`);
        }
    </script>
</body>
</html>
