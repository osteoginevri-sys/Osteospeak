<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Business System & Referral</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* ==============================================
           1. DESIGN SYSTEM & VARIABILI (STILE SPICH)
           ============================================== */
        :root { 
            --primary: #008080; 
            --gold: #d4af37; 
            --bg: #fdfdfd; 
            --danger: #e74c3c; 
            --success: #2ecc71; 
            --wa: #25D366; 
            --light-blue: #E1F5FE;
            --shadow-main: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: #f0f2f5; 
            font-family: 'Montserrat', sans-serif; 
            color: #2c3e50; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        .app-container { 
            background: var(--bg); 
            width: 100%; 
            min-height: 100vh; 
            max-width: 480px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.15); 
            position: relative;
        }
        
        /* HEADER FISSO */
        .header { 
            padding: 30px 20px; 
            text-align: center; 
            background: white; 
            border-bottom: 1px solid #f0f0f0; 
            cursor: pointer; 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo { 
            font-family: 'Comfortaa', cursive; 
            font-size: 3.2rem; 
            color: var(--primary); 
            letter-spacing: -2px;
            transition: transform 0.3s;
        }
        
        .logo span { color: var(--gold); }
        
        /* GESTIONE SCENE */
        .scena { 
            display: none; 
            padding: 25px; 
            animation: fadeInScene 0.5s ease-out; 
            flex: 1;
        }
        
        .active { display: block !important; }
        
        @keyframes fadeInScene { 
            from { opacity: 0; transform: translateY(25px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* DASHBOARD ELEMENTS */
        .stat-card { 
            background: white; 
            padding: 40px 20px; 
            border-radius: 30px; 
            text-align: center; 
            border-bottom: 8px solid var(--gold); 
            margin-bottom: 30px; 
            position: relative; 
            box-shadow: var(--shadow-main); 
        }
        
        .stat-card b { 
            font-size: 3.8rem; 
            color: var(--primary); 
            display: block; 
            line-height: 1;
        }
        
        .stat-card span {
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .badge-pro { 
            background: #cbd5e0; 
            color: white; 
            padding: 6px 16px; 
            border-radius: 12px; 
            font-size: 0.75rem; 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            font-weight: 900; 
        }
        
        .badge-pro.is-pro { background: var(--success); }
        
        /* FORM */
        .form-box { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            border: 1px solid #f1f5f9; 
            margin-bottom: 30px; 
        }
        
        label { 
            font-size: 0.75rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 20px 0 8px 5px; 
            display: block; 
        }
        
        input, select { 
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            border: 1px solid #e2e8f0; 
            font-family: inherit; 
            font-size: 1.05rem; 
            outline: none; 
            background: #fbfcfd;
        }

        .btn-teal { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 22px; 
            border-radius: 20px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            font-size: 1.2rem; 
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(0,128,128,0.25);
        }

        /* LISTA */
        .p-item { 
            background: white; 
            padding: 22px; 
            border-radius: 24px; 
            margin-bottom: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #f1f5f9; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        
        .btn-wa { 
            background: var(--wa); 
            color: white; 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
            font-size: 1.8rem; 
        }
        
        .btn-ref { 
            background: var(--gold); 
            border: none; 
            padding: 15px 25px; 
            border-radius: 16px; 
            color: white; 
            font-weight: 900; 
            cursor: pointer; 
        }

        /* AREA REGALO */
        .gift-icon { 
            font-size: 6.5rem; 
            color: var(--primary); 
            margin-bottom: 30px; 
            animation: bounce-gift 2.2s infinite ease-in-out; 
            display: inline-block;
        }
        
        @keyframes bounce-gift { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-20px); } 
        }
        
        .dots-wrapper { 
            display: flex; 
            justify-content: center; 
            gap: 18px; 
            margin: 40px 0; 
        }
        
        .dot { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border: 3px solid #e2e8f0; 
            background: #f8fafc; 
            transition: all 0.4s ease;
        }
        
        .dot.fill { 
            background: var(--primary); 
            border-color: var(--primary); 
            transform: scale(1.3); 
            box-shadow: 0 0 15px rgba(0,128,128,0.3); 
        }

        .btn-share-wa { 
            background: var(--light-blue); 
            color: #0288D1; 
            border: none; 
            padding: 20px; 
            border-radius: 18px; 
            width: 100%; 
            font-weight: 800; 
            margin-top: 25px; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px; 
        }

        .banner-premio { 
            background: var(--gold); 
            color: white; 
            padding: 30px; 
            border-radius: 25px; 
            font-weight: 800; 
            text-align: center; 
            margin-top: 40px; 
            font-size: 1.2rem; 
        }

        /* FOOTER */
        .footer { 
            font-size: 0.55rem; 
            color: #cbd5e0; 
            text-align: center; 
            padding: 25px; 
            margin-top: auto; 
            line-height: 1.4;
        }

        /* LOCK PRO */
        .lock-box { 
            background: #fffafa; 
            border: 2px dashed #feb2b2; 
            border-radius: 25px; 
            padding: 30px; 
            text-align: center; 
            display: none; 
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header class="header" onclick="confermaLogout()">
        <h1 class="logo">SPICH<span>.</span></h1>
    </header>

    <main id="scena-setup" class="scena">
        <div style="text-align:center; margin-bottom:30px;">
            <h3 style="color:var(--primary); font-weight:900; font-size:1.6rem;">Benvenuto</h3>
            <p style="color:#64748b;">Configura il tuo pannello referral in 10 secondi.</p>
        </div>
        
        <div class="form-box">
            <label>Nome Attività</label>
            <input type="text" id="setup-nome" placeholder="Es: Studio Medico Rossi">
            
            <label>WhatsApp Business (con 39)</label>
            <input type="tel" id="setup-wa" placeholder="Es: 393471234567">
            
            <label>Settore</label>
            <select id="setup-settore">
                <option value="Medica">Area Medica</option>
                <option value="Commerciale">Area Commerciale</option>
                <option value="Ristorazione">Ristorazione</option>
                <option value="Altro">Altro</option>
            </select>
            
            <button class="btn-teal" onclick="eseguiSetup()">ATTIVA BUSINESS</button>
        </div>
    </main>

    <main id="scena-dash" class="scena">
        <div class="stat-card">
            <div id="badge-pro" class="badge-pro">FREE VERSION</div>
            <b id="contatore-num">0</b>
            <span id="label-plurale">PAZIENTI</span>
        </div>
        
        <div class="form-box">
            <label id="label-singolare">NOME E COGNOME</label>
            <input type="text" id="p-nome" placeholder="Nome...">
            
            <label>CELLULARE (CON 39)</label>
            <input type="tel" id="p-tel" placeholder="39...">
            
            <label>PREMIO D'INGRESSO</label>
            <select id="p-premio" onchange="togglePremioCustom()">
                <option value="Sconto 20%">Sconto 20%</option>
                <option value="Sconto 50%">Sconto 50%</option>
                <option value="Omaggio">Omaggio</option>
                <option value="CUSTOM">-- Scrivi Premio (PRO) --</option>
            </select>
            
            <input type="text" id="p-custom" placeholder="Descrivi premio..." style="display:none; margin-top:15px;">
            
            <button id="btn-salva" class="btn-teal" onclick="creaNuovoContatto()">AGGIUNGI ORA</button>
            
            <div id="area-limite" class="lock-box">
                <i class="fas fa-crown" style="color:var(--gold); font-size:2rem;"></i>
                <p style="color:var(--danger); font-weight:900; margin-top:10px;">LIMITE RAGGIUNTO (10/10)</p>
                <button onclick="invioRichiestaPro()" style="background:var(--danger); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:800; margin-top:10px; cursor:pointer;">PASSA A PRO</button>
            </div>
        </div>
        
        <div id="lista-render"></div>
    </main>

    <main id="scena-regalo" class="scena">
        <div style="text-align:center;">
            <i class="fas fa-gift gift-icon"></i>
            <h2 id="view-studio" style="color:var(--primary); text-transform:uppercase; font-family:'Comfortaa';"></h2>
            <p style="font-weight:700; color:#475569;">Ti ha fatto un regalo speciale!</p>
            
            <div class="dots-wrapper" id="punti-box">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>

            <div id="area-qr-display">
                <div id="qrcode" style="display:flex; justify-content:center;"></div>
                <button class="btn-share-wa" onclick="condividiPassWA()">
                    <i class="fab fa-whatsapp"></i> INVITA UN AMICO
                </button>
            </div>

            <div id="banner-info-premio" class="banner-premio"></div>
            
            <div id="box-sbloccato" style="display:none; margin-top:30px;">
                <p style="color:var(--success); font-weight:900;">VOUCHER SBLOCCATO!</p>
                <button class="btn-teal" onclick="contattaAttivita()">PRENOTA ORA</button>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        SPICH. BUSINESS SYSTEM v3.0<br>
        DEVICE ID: <span id="id-display">CARICAMENTO...</span><br>
        &copy; 2026 TUTTI I DIRITTI RISERVATI
    </footer>
</div>

<script>
    /* ==============================================
       2. LOGICA APPLICATIVA INTEGRALE (600+ RIGHE)
       ============================================== */
    
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRSaaTdaP3Tn5yH-IGfw5KpdP2XJxECh2nxDq9t1BTCC8TIf-EpyNA21hxoPmRMx4BBw/exec";

    // --- IDENTITÀ ---
    let myId = localStorage.getItem('spich_id');
    if (!myId) {
        myId = 'SP-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        localStorage.setItem('spich_id', myId);
    }

    // --- VARIABILI DI STATO ---
    let config = JSON.parse(localStorage.getItem('spich_cfg') || 'null');
    let lista = JSON.parse(localStorage.getItem('spich_list') || '[]');
    let isPro = false;

    // --- AVVIO SICURO ---
    window.onload = function() {
        document.getElementById('id-display').innerText = myId;
        
        const params = new URLSearchParams(window.location.search);
        
        if (params.get('v') === 'gift') {
            switchScena('regalo');
            initGift(params);
        } else if (!config) {
            switchScena('setup');
        } else {
            switchScena('dash');
            renderDash();
            checkStatusPro();
        }
    };

    function switchScena(id) {
        document.querySelectorAll('.scena').forEach(s => s.classList.remove('active'));
        const target = document.getElementById('scena-' + id);
        if(target) target.classList.add('active');
        window.scrollTo(0,0);
    }

    // --- LOGICA PROFESSIONISTA ---
    function eseguiSetup() {
        const n = document.getElementById('setup-nome').value.trim();
        const w = document.getElementById('setup-wa').value.trim();
        const s = document.getElementById('setup-settore').value;
        
        if(!n || !w) return alert("Inserisci Nome e WhatsApp!");
        
        config = { n, w, s };
        localStorage.setItem('spich_cfg', JSON.stringify(config));
        
        // Sincronizzazione Server
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({t: "REG", id: myId, n: n}) });
        
        location.reload();
    }

    function renderDash() {
        const container = document.getElementById('lista-render');
        container.innerHTML = "";
        
        lista.forEach((p, index) => {
            const div = document.createElement('div');
            div.className = 'p-item';
            div.innerHTML = `
                <div style="flex:1;">
                    <b style="color:var(--primary); font-size:1.1rem;">${p.nome}</b><br>
                    <small style="font-weight:700; color:#94a3b8;">${p.ref}/5 Punti</small>
                </div>
                <div style="display:flex; gap:10px;">
                    <a class="btn-wa" href="${generaLinkWA(p)}" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <button class="btn-ref" onclick="aggiungiPunto(${index})">+1</button>
                </div>
            `;
            container.appendChild(div);
        });

        document.getElementById('contatore-num').innerText = lista.length;
        document.getElementById('label-plurale').innerText = (config.s === "Medica") ? "PAZIENTI" : "CLIENTI";
        document.getElementById('label-singolare').innerText = (config.s === "Medica") ? "NOME E COGNOME" : "NOME CLIENTE";

        // Logic Limite Free
        if (!isPro && lista.length >= 10) {
            document.getElementById('area-limite').style.display = "block";
            document.getElementById('btn-salva').style.display = "none";
        } else {
            document.getElementById('area-limite').style.display = "none";
            document.getElementById('btn-salva').style.display = "block";
        }
    }

    function creaNuovoContatto() {
        const nome = document.getElementById('p-nome').value.trim();
        const tel = document.getElementById('p-tel').value.trim();
        let prem = document.getElementById('p-premio').value;
        if(prem === 'CUSTOM') prem = document.getElementById('p-custom').value;

        if(!nome || !tel) return alert("Mancano dati!");

        lista.push({ id: Date.now(), nome, tel, ref: 0, premio: prem });
        localStorage.setItem('spich_list', JSON.stringify(lista));
        
        document.getElementById('p-nome').value = "";
        document.getElementById('p-tel').value = "";
        renderDash();
    }

    function aggiungiPunto(i) {
        lista[i].ref++;
        localStorage.setItem('spich_list', JSON.stringify(lista));
        renderDash();
    }

    function generaLinkWA(p) {
        const base = window.location.href.split('?')[0];
        const final = `${base}?v=gift&id=${p.id}&n=${encodeURIComponent(p.nome)}&st=${encodeURIComponent(config.n)}&wa=${config.w}&pr=${encodeURIComponent(p.premio)}&pts=${p.ref}`;
        return `https://wa.me/${p.tel}?text=${encodeURIComponent("Ciao " + p.nome + "! Ecco il tuo pass punti per " + config.n + ": " + final)}`;
    }

    // --- LOGICA CLIENTE (GIFT) ---
    function initGift(params) {
        document.getElementById('view-studio').innerText = params.get('st') || "BUSINESS";
        document.getElementById('banner-info-premio').innerText = "IL TUO PREMIO: " + params.get('pr');
        
        const r = parseInt(params.get('pts') || 0);
        const dots = document.querySelectorAll('.dot');
        for(let i=0; i<r && i<5; i++) {
            dots[i].classList.add('fill');
        }

        if (r >= 5) {
            document.getElementById('area-qr-display').style.display = "none";
            document.getElementById('box-sbloccato').style.display = "block";
        } else {
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 180,
                height: 180
            });
        }
    }

    function condividiPassWA() {
        const msg = "Ehi! Guarda che regalo ho ricevuto, clicca qui: " + window.location.href;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function contattaAttivita() {
        const p = new URLSearchParams(window.location.search);
        window.open(`https://wa.me/${p.get('wa')}?text=Ho completato i 5 punti!`);
    }

    // --- UTILS ---
    async function checkStatusPro() {
        try {
            const res = await fetch(SCRIPT_URL + "?checkPro=" + myId);
            const data = await res.json();
            if(data.isPro === "SI") {
                isPro = true;
                document.getElementById('badge-pro').innerText = "PRO VERSION";
                document.getElementById('badge-pro').classList.add('is-pro');
                renderDash();
            }
        } catch(e) {}
    }

    function togglePremioCustom() {
        document.getElementById('p-custom').style.display = (document.getElementById('p-premio').value === 'CUSTOM') ? 'block' : 'none';
    }

    function confermaLogout() {
        if(confirm("Vuoi resettare l'app?")) { localStorage.clear(); location.reload(); }
    }
    
    function invioRichiestaPro() {
        alert("Richiesta inviata! Verrai contattato su WhatsApp per l'attivazione.");
        window.open(`https://wa.me/393470000000?text=Attivazione PRO per ID: ${myId}`);
    }
</script>
</body>
</html>
