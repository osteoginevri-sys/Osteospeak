<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Premium Network V.10</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* =========================================================
           STILE SPICH. PREMIUM
           ========================================================= */
        :root { 
            --teal-primary: #008080; 
            --gold-premium: #d4af37;
            --white: #ffffff;
            --bg-canvas: #f8fafc;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --radius-main: 30px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            background: var(--bg-canvas); 
            font-family: 'Montserrat', sans-serif; 
            color: var(--text-dark); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
        }

        .main-wrapper { 
            width: 100%; 
            max-width: 500px; 
            background: var(--white); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.02);
        }

        /* Branding */
        .app-header { 
            padding: 40px 20px; 
            text-align: center; 
            background: var(--white); 
            border-bottom: 1px solid #f1f5f9; 
            cursor: pointer;
        }
        .logo-main { 
            font-family: 'Comfortaa', cursive; 
            font-size: 3.5rem; 
            color: var(--teal-primary); 
            letter-spacing: -3px;
            font-weight: 700;
        }
        .logo-main span { color: var(--gold-premium); }
        .logo-sub { 
            font-size: 0.7rem; font-weight: 800; color: var(--text-gray); 
            letter-spacing: 4px; text-transform: uppercase; margin-top: -10px; 
        }

        /* Scene Management */
        .scene-view { 
            display: none; padding: 25px; 
            animation: fadeIn 0.4s ease; flex: 1; 
        }
        .scene-view.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Stats */
        .hero-stats { 
            background: var(--white); padding: 40px 20px; 
            border-radius: var(--radius-main); text-align: center; 
            border-bottom: 8px solid var(--gold-premium); 
            margin-bottom: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); 
            position: relative;
        }
        .hero-stats b { font-size: 5rem; color: var(--teal-primary); display: block; line-height: 1; font-weight: 800; }
        .hero-stats span { font-weight: 700; color: var(--text-gray); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        .status-pill { 
            position: absolute; top: 15px; right: 20px; font-size: 0.6rem; 
            font-weight: 900; padding: 8px 15px; border-radius: 12px; 
            background: #f1f5f9; color: var(--text-gray);
        }
        .status-pill.is-pro { background: var(--gold-premium); color: white; }

        /* UI Elements */
        .ui-card { 
            background: var(--white); padding: 25px; border-radius: 25px; 
            border: 1px solid #f1f5f9; margin-bottom: 25px; 
        }
        .ui-label { 
            font-size: 0.7rem; font-weight: 800; color: var(--teal-primary); 
            text-transform: uppercase; margin: 15px 0 5px 5px; display: block; 
        }

        .prefix-container { position: relative; display: flex; align-items: center; }
        .prefix-addon { position: absolute; left: 18px; font-weight: 800; color: var(--teal-primary); }
        
        input, select { 
            width: 100%; padding: 20px; border-radius: 20px; 
            border: 2px solid #f1f5f9; font-family: inherit; font-size: 1rem; 
            outline: none; transition: 0.3s; background: #fafafa;
        }
        input.with-prefix { padding-left: 55px; }
        input:focus { border-color: var(--gold-premium); background: white; }

        .btn-main { 
            background: var(--teal-primary); color: white; border: none; 
            padding: 22px; border-radius: 20px; font-weight: 800; 
            width: 100%; cursor: pointer; font-size: 1.1rem; 
            margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* Lista Righe */
        .row-item { 
            background: white; padding: 20px; border-radius: 25px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; border: 1px solid #f1f5f9; 
        }
        .row-info b { font-size: 1.1rem; color: var(--teal-primary); display: block; }
        .row-info small { font-weight: 700; color: var(--text-gray); text-transform: uppercase; font-size: 0.65rem; }

        .btn-circle { 
            width: 44px; height: 44px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; text-decoration: none; 
            border: none; cursor: pointer; margin-left: 5px;
        }
        .btn-wa { background: #25D366; color: white; font-size: 1.3rem; }
        .btn-pt { background: var(--gold-premium); color: white; font-weight: 900; }
        .btn-del { background: #fee2e2; color: #ef4444; }

        /* Pallini Fedeltà */
        .dots-wrap { display: flex; justify-content: center; gap: 12px; margin: 30px 0; }
        .dot { 
            width: 25px; height: 25px; border-radius: 50%; 
            border: 3px solid var(--gold-premium); transition: 0.4s; position: relative;
        }
        .dot.active { background: var(--gold-premium); transform: scale(1.15); }
        .dot.active::after {
            content: '✓'; color: white; font-size: 10px; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900;
        }

        /* Sezione Finale */
        .reward-win {
            display: none; margin-top: 25px; padding: 25px; 
            background: #fffcf5; border: 2px solid var(--gold-premium); border-radius: 25px; text-align: center;
        }

        .footer { 
            font-size: 0.65rem; color: #cbd5e1; text-align: center; 
            padding: 30px; margin-top: auto; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; 
        }
        .info-btn { 
            color: var(--text-gray); font-size: 1rem; cursor: pointer; margin-bottom: 10px; display: inline-block;
        }

    </style>
</head>
<body>

<div class="main-wrapper">
    
    <header class="app-header" onclick="syncWithServer()">
        <h1 class="logo-main">SPICH<span>.</span></h1>
        <div class="logo-sub">Premium Network</div>
    </header>

    <main id="view-setup" class="scene-view">
        <div style="text-align:center; margin-bottom:20px;">
            <i class="fas fa-id-card" style="font-size:3rem; color:var(--gold-premium); margin-bottom:10px;"></i>
            <h2 style="color:var(--teal-primary); font-weight:800;">Setup Attività</h2>
        </div>
        <div class="ui-card">
            <label class="ui-label">Nome Attività Professionale</label>
            <input type="text" id="set-name" placeholder="Es: Studio Medico Rossi">
            
            <label class="ui-label">WhatsApp Business</label>
            <div class="prefix-container">
                <span class="prefix-addon">+39</span>
                <input type="tel" id="set-wa" class="with-prefix" placeholder="3470000000">
            </div>
            
            <label class="ui-label">Categoria</label>
            <select id="set-cat">
                <option value="Salute">Salute</option>
                <option value="Ristorazione">Ristorazione</option>
                <option value="Wellness">Wellness</option>
                <option value="Altro">Altro</option>
            </select>
            
            <button class="btn-main" onclick="registerBiz()">
                <i class="fas fa-check-circle"></i> SALVA PROFILO
            </button>
        </div>
    </main>

    <main id="view-dash" class="scene-view">
        <div class="hero-stats">
            <div id="badge-pro" class="status-pill">FREE</div>
            <b id="count-ui">0</b>
            <span>Anagrafiche Attive</span>
        </div>
        
        <div class="ui-card">
            <h4 style="color:var(--teal-primary); font-weight:800; margin-bottom:15px;">Nuovo Inserimento</h4>
            
            <label class="ui-label">Nome Cliente / Paziente</label>
            <input type="text" id="new-name" placeholder="Nome Cognome">
            
            <label class="ui-label">WhatsApp</label>
            <div class="prefix-container">
                <span class="prefix-addon">+39</span>
                <input type="tel" id="new-tel" class="with-prefix" placeholder="3470000000">
            </div>
            
            <div id="reward-controls">
                <label class="ui-label">Sconto Benvenuto (Amico)</label>
                <div id="sc-box">
                    <select id="sel-sc">
                        <option value="Sconto 10%">10% Sconto</option>
                        <option value="Sconto 20%">20% Sconto</option>
                    </select>
                </div>
                
                <label class="ui-label">Premio Fedeltà (5° Punto)</label>
                <div id="pr-box">
                    <input type="text" id="inp-pr" value="Trattamento con sconto 50%" readonly style="color:#94a3b8;">
                </div>
            </div>
            
            <button id="main-add-btn" class="btn-main" onclick="saveNewEntry()">
                <i class="fas fa-plus-circle"></i> GENERA PASS
            </button>
        </div>
        
        <h3 style="color:var(--teal-primary); margin-bottom:12px; font-weight:800;">Registro Corrente</h3>
        <div id="list-render"></div>
    </main>

    <main id="view-pass" class="scene-view">
        <div style="text-align:center;">
            <i class="fas fa-certificate" style="font-size:3.5rem; color:var(--gold-premium); margin-bottom:15px;"></i>
            <h2 id="pass-biz" style="color:var(--teal-primary); font-family:'Comfortaa';"></h2>
            <p id="pass-user" style="font-weight:700; color:var(--text-gray); margin-top:5px;"></p>
            
            <div class="dots-wrap" id="pass-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="qr-box">
                <div id="pass-qr"></div>
            </div>
            
            <button class="btn-main" style="background:var(--gold-premium);" onclick="shareVoucher()">
                <i class="fab fa-whatsapp"></i> REGALA SCONTO A UN AMICO
            </button>
            
            <div id="pass-win" class="reward-win">
                <b style="color:var(--teal-primary); font-size:1.1rem;">COMPLIMENTI! HAI OTTENUTO:</b><br>
                <p id="pass-win-text" style="font-weight:800; color:var(--gold-premium); margin-top:10px; font-size:1.3rem;"></p>
            </div>
        </div>
    </main>

    <main id="view-voucher" class="scene-view">
        <div style="background:white; border:8px dashed #f1f5f9; padding:40px 25px; border-radius:40px; text-align:center;">
            <h2 style="color:var(--teal-primary); font-weight:900;">REGALO PER TE</h2>
            <p id="v-msg" style="margin:20px 0; font-weight:600; color:var(--text-gray);"></p>
            
            <div style="background:#f8fafc; padding:25px; border-radius:25px; border:2px solid var(--gold-premium); margin-bottom:25px;">
                <span style="font-size:0.7rem; font-weight:800; color:var(--gold-premium); text-transform:uppercase;">Valore Coupon:</span>
                <h2 id="v-val" style="color:var(--teal-primary); font-size:2rem;"></h2>
            </div>
            
            <button class="btn-main" onclick="bookNow()">
                <i class="fab fa-whatsapp"></i> PRENOTA ORA
            </button>
        </div>
    </main>

    <footer class="footer">
        <div class="info-btn" onclick="showHelp()"><i class="fas fa-info-circle"></i> Info & Assistenza</div><br>
        ID: <span id="did-info">...</span><br>
        &copy; 2026 SPICH. PREMIUM NETWORK
    </footer>
</div>

<script>
    /* =========================================================
       LOGICA CORE V.10
       ========================================================= */

    const API = "https://script.google.com/macros/s/AKfycbwWFA28ko71ow6kzvDYpQBhWru1WIAU2wD4YMgCaTArReLgAZSvDxJMwDqkDKqdQ8f-7g/exec";

    let deviceID = localStorage.getItem('spich_id_v10') || ('SP-' + Math.random().toString(36).substr(2, 9).toUpperCase());
    localStorage.setItem('spich_id_v10', deviceID);

    let bizData = JSON.parse(localStorage.getItem('spich_biz_v10') || 'null');
    let localList = JSON.parse(localStorage.getItem('spich_list_v10') || '[]');
    let isPro = false;

    window.onload = async function() {
        document.getElementById('did-info').innerText = deviceID;
        const q = new URLSearchParams(window.location.search);

        if (q.get('v') === 'voucher') {
            initVoucher(q);
        } else if (q.get('v') === 'gift') {
            await initPass(q);
        } else if (!bizData) {
            show('setup');
        } else {
            show('dash');
            await syncWithServer();
            render();
        }
    };

    function show(id) {
        document.querySelectorAll('.scene-view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        window.scrollTo(0,0);
    }

    /* --- ESERCENTE --- */

    async function syncWithServer() {
        try {
            const r = await fetch(`${API}?checkPro=${deviceID}`);
            const d = await r.json();
            
            // Se lo script non trova più l'esercente (cancellato da te su Google)
            if (d.status === "NOT_FOUND") {
                localStorage.clear();
                location.reload();
                return;
            }

            if (d.isPro === "PRO") {
                isPro = true;
                bizData.nome = d.bizName; 
                localStorage.setItem('spich_biz_v10', JSON.stringify(bizData));
            }
            applyProUI();
        } catch(e) { console.log("Offline mode"); }
    }

    function applyProUI() {
        const badge = document.getElementById('badge-pro');
        if (isPro) {
            badge.innerText = "PRO"; badge.classList.add('is-pro');
            document.getElementById('sc-box').innerHTML = `<input type="text" id="sel-sc" placeholder="Sconto libero">`;
            document.getElementById('pr-box').innerHTML = `<input type="text" id="inp-pr" placeholder="Premio libero">`;
        }
        if (!isPro && localList.length >= 10) document.getElementById('main-add-btn').disabled = true;
    }

    function registerBiz() {
        const n = document.getElementById('set-name').value.trim();
        const w = document.getElementById('set-wa').value.trim();
        const c = document.getElementById('set-cat').value;

        if (!n || !w) return alert("Completa i dati.");
        
        bizData = { nome: n, wa: '39' + w, cat: c };
        localStorage.setItem('spich_biz_v10', JSON.stringify(bizData));
        
        fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify({t: "REG_BIZ", id: deviceID, nome: n, settore: c}) });
        location.reload();
    }

    function render() {
        const cont = document.getElementById('list-render');
        cont.innerHTML = "";
        localList.forEach((c, i) => {
            const row = document.createElement('div');
            row.className = 'row-item';
            row.innerHTML = `
                <div class="row-info">
                    <b>${c.nome}</b>
                    <small>${c.pts} PUNTI | ${c.premio}</small>
                </div>
                <div style="display:flex;">
                    <a class="btn-circle btn-wa" href="${genWa(c)}" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <button class="btn-circle btn-pt" onclick="addPoint(${i})">+1</button>
                    ${isPro ? `<button class="btn-circle btn-del" onclick="delRow(${i})"><i class="fas fa-trash"></i></button>` : ''}
                </div>
            `;
            cont.appendChild(row);
        });
        document.getElementById('count-ui').innerText = localList.length;
    }

    async function saveNewEntry() {
        const n = document.getElementById('new-name').value.trim();
        const t = document.getElementById('new-tel').value.trim();
        const sc = document.getElementById('sel-sc').value;
        const pr = document.getElementById('inp-pr').value.trim();

        if (!n || !t) return alert("Inserisci Nome e Cellulare.");

        const cid = 'C-' + Date.now().toString(36).toUpperCase();
        const entry = { cid, nome: n, tel: '39' + t, sconto: sc, premio: pr, pts: 0 };
        
        localList.push(entry);
        localStorage.setItem('spich_list_v10', JSON.stringify(localList));

        fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify({
            t: "ADD_CLIENT", bizId: deviceID, bizName: bizData.nome, 
            clientName: n, clientTel: '39' + t, premio: pr, cid: cid, pts: 0
        })});

        render();
        document.getElementById('new-name').value = "";
        document.getElementById('new-tel').value = "";
    }

    async function addPoint(idx) {
        const c = localList[idx];
        c.pts++;
        localStorage.setItem('spich_list_v10', JSON.stringify(localList));
        
        fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify({
            t: "UPDATE_POINTS", bizId: deviceID, cid: c.cid, pts: c.pts
        })});
        render();
    }

    function delRow(i) {
        if(confirm("Eliminare questa anagrafica?")) {
            localList.splice(i,1);
            localStorage.setItem('spich_list_v10', JSON.stringify(localList));
            render();
        }
    }

    function genWa(c) {
        const base = window.location.href.split('?')[0];
        const link = `${base}?v=gift&st=${encodeURIComponent(bizData.nome)}&wa=${bizData.wa}&cid=${c.cid}&pr=${encodeURIComponent(c.premio)}&n=${encodeURIComponent(c.nome)}&sc=${encodeURIComponent(c.sconto)}`;
        const msg = `Ciao ${c.nome}, ecco il tuo Pass digitale per ${bizData.nome}: ${link}`;
        return `https://wa.me/${c.tel}?text=${encodeURIComponent(msg)}`;
    }

    /* --- PAZIENTE --- */

    async function initPass(q) {
        show('pass');
        document.getElementById('pass-biz').innerText = q.get('st');
        document.getElementById('pass-user').innerText = "Benvenuto " + q.get('n');
        document.getElementById('pass-win-text').innerText = q.get('pr');

        new QRCode(document.getElementById("pass-qr"), { text: window.location.href, width: 160, height: 160, colorDark: "#008080" });

        // AGGIORNAMENTO PALLINI REAL-TIME DA SERVER
        try {
            const r = await fetch(`${API}?getCid=${q.get('cid')}`);
            const d = await r.json();
            const pts = parseInt(d.pts || 0);
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => { if(i < pts) dot.classList.add('active'); });
            if(pts >= 5) document.getElementById('pass-win').style.display = "block";
        } catch(e) {}
    }

    function shareVoucher() {
        const q = new URLSearchParams(window.location.search);
        const base = window.location.href.split('?')[0];
        const link = `${base}?v=voucher&st=${encodeURIComponent(q.get('st'))}&wa=${q.get('wa')}&da=${encodeURIComponent(q.get('n'))}&pr=${encodeURIComponent(q.get('sc'))}`;
        const msg = `Ciao! Ti invio un regalo da parte di ${q.get('n')} da usare presso ${q.get('st')}: ${link}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    /* --- AMICO --- */

    function initVoucher(q) {
        show('voucher');
        document.getElementById('v-msg').innerText = `${q.get('da')} ti ha inviato un bonus speciale da utilizzare presso ${q.get('st')}!`;
        document.getElementById('v-val').innerText = q.get('pr');
    }

    function bookNow() {
        const q = new URLSearchParams(window.location.search);
        const msg = `Ciao! Ho ricevuto un regalo da ${q.get('da')} per ${q.get('st')}. Vorrei prenotare: ${q.get('pr')}`;
        window.open(`https://wa.me/${q.get('wa')}?text=${encodeURIComponent(msg)}`);
    }

    function showHelp() {
        alert("SPICH. Network Support\nEmail: spich.admin@gmail.com\n\nFornisci il tuo ID per modifiche o upgrade.");
    }

</script>
</body>
</html>
