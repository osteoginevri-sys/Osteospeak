<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPICH. - Business System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { 
            --primary: #008080; /* Ottanio SPICH */
            --gold: #d4af37; 
            --bg: #fdfdfd; 
            --danger: #e74c3c; 
            --success: #2ecc71; 
            --wa: #25D366; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #f4f6f7; font-family: 'Montserrat', sans-serif; color: #2c3e50; min-height: 100vh; }
        
        .app-container { background: var(--bg); width: 100%; min-height: 100vh; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        .header { padding: 20px; text-align: center; background: white; border-bottom: 1px solid #eee; cursor: pointer; z-index: 100; }
        .logo { font-family: 'Comfortaa', cursive; font-size: 2.2rem; color: var(--primary); }
        .logo span { color: var(--gold); }
        
        /* Scene Management */
        .scena { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Dashboard Elements */
        .stat-card { background: white; padding: 20px; border-radius: 18px; text-align: center; border-bottom: 5px solid var(--gold); margin-bottom: 20px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card b { font-size: 2.5rem; color: var(--primary); display: block; }
        .badge-pro { background: #bbb; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; position: absolute; top: 10px; right: 10px; font-weight: 800; }
        .badge-pro.is-pro { background: var(--success); }
        
        /* Forms */
        .form-box { background: white; padding: 15px; border-radius: 18px; border: 1px solid #eee; margin-bottom: 20px; }
        label { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-top: 10px; display: block; padding-left: 5px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 12px 0; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; outline: none; background: #fff; }
        .btn-teal { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; }
        
        /* List Items */
        .p-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .btn-wa { background: var(--wa); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.5rem; margin-right: 8px; }
        .btn-ref { background: var(--gold); border: none; padding: 10px 15px; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; }
        .btn-del { color: var(--danger); background: none; border: none; font-size: 1.1rem; margin-right: 15px; cursor: pointer; display: none; }
        
        /* Promo PRO */
        .lock-box { background: #fff5f5; border: 2px dashed var(--danger); border-radius: 15px; padding: 20px; text-align: center; display: none; margin-top: 10px; }
        .btn-pro { background: var(--danger); color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* --- VISTA REGALO (CLIENTE) --- */
        .gift-icon { font-size: 5rem; color: var(--primary); margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .dots-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ddd; background: #eee; transition: 0.4s; }
        .dot.fill { background: var(--primary); border-color: var(--primary); transform: scale(1.2); box-shadow: 0 0 10px rgba(0,128,128,0.3); }
        
        .btn-share { background: #E1F5FE; color: #0288D1; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; margin-top: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .banner-oro { background: var(--gold); color: white; padding: 20px; border-radius: 15px; font-weight: 800; text-align: center; margin-top: 20px; box-shadow: 0 4px 15px rgba(212,175,55,0.2); }
        
        .footer { font-size: 0.6rem; color: #bbb; text-align: center; padding: 20px; margin-top: auto; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" onclick="confermaReset()">
        <h1 class="logo">SPICH<span>.</span></h1>
    </div>

    <div id="scena-setup" class="scena">
        <h3 style="text-align:center; margin-bottom:20px; color:var(--primary);">Configura la tua attività</h3>
        <div class="form-box">
            <label>Nome Attività</label>
            <input type="text" id="set-att" placeholder="Es: Studio Medico Rossi">
            <label>WhatsApp Business (es. 39347...)</label>
            <input type="tel" id="set-wa" placeholder="39...">
            <label>Tipo di Attività</label>
            <select id="set-cat">
                <option value="Medica">Settore Medico (Pazienti)</option>
                <option value="Commerciale">Settore Commerciale (Clienti)</option>
                <option value="Ristorazione">Settore Ristorazione (Ospiti)</option>
            </select>
            <button class="btn-teal" onclick="salvaSetup()">ATTIVA ORA</button>
        </div>
    </div>

    <div id="scena-dash" class="scena">
        <div class="stat-card">
            <div id="badge-pro" class="badge-pro">FREE</div>
            <b id="contatore">0</b>
            <span id="label-cat">Contatti</span>
        </div>
        
        <div class="form-box">
            <label id="label-nome">Nome e Cognome</label>
            <input type="text" id="new-nome" placeholder="Inserisci...">
            <label>Cellulare</label>
            <input type="tel" id="new-tel" placeholder="39...">
            <label>Premio Referral</label>
            <select id="new-premio" onchange="checkPremioCustom()">
                <option value="Sconto 20%">Sconto 20%</option>
                <option value="Sconto 50%">Sconto 50%</option>
                <option value="Omaggio">Trattamento Omaggio</option>
                <option value="CUSTOM">-- Scrivi premio (Solo PRO) --</option>
            </select>
            <input type="text" id="new-custom" placeholder="Descrivi il premio..." style="display:none; margin-top:10px;">
            
            <button id="btn-add" class="btn-teal" onclick="aggiungiContatto()" style="margin-top:10px;">AGGIUNGI</button>
            
            <div id="box-lock" class="lock-box">
                <p style="color:var(--danger); font-weight:800;">LIMITE 10 CONTATTI RAGGIUNTO</p>
                <button onclick="chiediPro()" class="btn-pro">DIVENTA PRO</button>
            </div>
        </div>
        
        <div id="lista-contatti"></div>
    </div>

    <div id="scena-regalo" class="scena">
        <div style="text-align:center;">
            <i class="fas fa-gift gift-icon"></i>
            <h2 id="reg-studio" style="color:var(--primary); text-transform:uppercase;"></h2>
            <p style="margin-bottom:20px; font-weight:700;">Pass Regalo Referral</p>
            
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>

            <div id="qrcode-area">
                <div id="qrcode" style="margin:0 auto; padding:15px; background:white; display:inline-block; border-radius:15px; border:1px solid #eee;"></div>
                <button class="btn-share" onclick="condividiLink()">
                    <i class="fab fa-whatsapp"></i> INVITA AMICI
                </button>
            </div>

            <div id="reg-premio" class="banner-oro"></div>
            
            <div id="box-prenota" style="display:none; margin-top:25px;">
                <button class="btn-teal" onclick="prenotaOra()">RISCATTA IL PREMIO</button>
            </div>
        </div>
    </div>
    
    <div class="footer">ID: <span id="dev-id"></span> | SPICH. SYSTEM</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxN0X_dQwhqRSsAIMvNLCVDDQDUTWoZnQO85cz03f9ouZJz58gFQCqBc5rvzZBdw6y1-Q/exec";
    
    // Inizializzazione Dati con Protezione
    let deviceId = localStorage.getItem('spich_id') || ('SP' + Math.floor(Math.random() * 90000));
    localStorage.setItem('spich_id', deviceId);

    let config = null;
    try { config = JSON.parse(localStorage.getItem('spich_cfg')); } catch(e) { config = null; }
    
    let contatti = [];
    try { contatti = JSON.parse(localStorage.getItem('spich_list')) || []; } catch(e) { contatti = []; }
    
    let isPro = false;

    // Funzione per cambiare scena (CORRETTA)
    function mostraScena(id) {
        console.log("Cambio scena in: " + id);
        const tutte = document.querySelectorAll('.scena');
        tutte.forEach(s => s.classList.remove('active'));
        const target = document.getElementById('scena-' + id);
        if (target) target.classList.add('active');
    }

    window.onload = function() {
        document.getElementById('dev-id').innerText = deviceId;
        const params = new URLSearchParams(window.location.search);
        
        if (params.get('v') === 'gift') {
            mostraScena('regalo');
            caricaRegalo(params);
        } else if (!config || !config.n) {
            mostraScena('setup');
        } else {
            mostraScena('dash');
            inizializzaDash();
            checkStatoPro();
        }
    };

    async function checkStatoPro() {
        try {
            const r = await fetch(API_URL + "?checkPro=" + deviceId);
            const d = await r.json();
            if (d.isPro) {
                isPro = true;
                document.getElementById('badge-pro').innerText = "PRO";
                document.getElementById('badge-pro').classList.add('is-pro');
                document.getElementById('box-lock').style.display = "none";
                document.querySelectorAll('.btn-del').forEach(b => b.style.display = "block");
            }
        } catch(e) { console.log("Check PRO offline"); }
    }

    function inizializzaDash() {
        let s = "Cliente"; if(config.cat === "Medica") s = "Paziente"; else if(config.cat === "Ristorazione") s = "Ospite";
        document.getElementById('label-nome').innerText = "Nome " + s;
        document.getElementById('label-cat').innerText = s + "i";
        renderLista();
    }

    function salvaSetup() {
        const n = document.getElementById('set-att').value.trim();
        const w = document.getElementById('set-wa').value.trim();
        const c = document.getElementById('set-cat').value;
        if (!n || !w) return alert("Inserisci i dati richiesti");
        config = { n, w, cat: c };
        localStorage.setItem('spich_cfg', JSON.stringify(config));
        fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({tipo:'REG_ESERCENTE', deviceId, nomeAtt: n, wa: w}) });
        location.reload();
    }

    function aggiungiContatto() {
        if (!isPro && contatti.length >= 10) return alert("Limite raggiunto");
        const nome = document.getElementById('new-nome').value.trim();
        const tel = document.getElementById('new-tel').value.trim();
        let premio = document.getElementById('new-premio').value;
        if (premio === 'CUSTOM') premio = document.getElementById('new-custom').value.trim();
        if (!nome || !tel) return alert("Mancano dati");

        const nuovo = { id: 'PX'+Date.now(), nome, tel, premio, ref: 0, owner: deviceId, att: config.n, wa: config.w };
        contatti.push(nuovo);
        salvaTutto();
        document.getElementById('new-nome').value = ""; document.getElementById('new-tel').value = "";
    }

    function renderLista() {
        const container = document.getElementById('lista-contatti');
        container.innerHTML = "";
        contatti.forEach((p, i) => {
            container.innerHTML += `
            <div class="p-item">
                <button class="btn-del" onclick="elimina(${i})" style="display:${isPro?'block':'none'}"><i class="fas fa-trash"></i></button>
                <div style="flex:1"><b>${p.nome}</b><br><small>${p.ref}/5 Punti</small></div>
                <div style="display:flex">
                    <a class="btn-wa" href="${generaLinkWA(p)}" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <button class="btn-ref" onclick="addPunto(${i})">+1</button>
                </div>
            </div>`;
        });
        document.getElementById('contatore').innerText = contatti.length;
        if(!isPro && contatti.length >= 10) {
            document.getElementById('box-lock').style.display = "block";
            document.getElementById('btn-add').style.display = "none";
        }
    }

    function generaLinkWA(p) {
        const base = window.location.href.split('?')[0];
        const url = `${base}?v=gift&id=${p.id}&n=${encodeURIComponent(p.nome)}&st=${encodeURIComponent(config.n)}&wa=${config.w}&pr=${encodeURIComponent(p.premio)}&ref=${p.ref}`;
        return `https://wa.me/${p.tel}?text=${encodeURIComponent("Ciao " + p.nome + "! Ecco il tuo pass regalo per " + config.n + ": " + url)}`;
    }

    function addPunto(i) { contatti[i].ref++; salvaTutto(); }
    function elimina(i) { if(confirm("Eliminare?")) { contatti.splice(i,1); salvaTutto(); } }
    function salvaTutto() {
        localStorage.setItem('spich_list', JSON.stringify(contatti));
        renderLista();
        const p = contatti[contatti.length-1];
        if(p) fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({tipo:'ADD_PAZIENTE', ...p}) });
    }

    function caricaRegalo(params) {
        document.getElementById('reg-studio').innerText = params.get('st');
        const punti = parseInt(params.get('ref') || 0);
        const dots = document.querySelectorAll('.dot');
        for(let i=0; i<punti && i<5; i++) dots[i].classList.add('fill');

        if(punti >= 5) {
            document.getElementById('qrcode-area').innerHTML = "<h2 style='color:var(--success)'>🔥 PREMIO SBLOCCATO!</h2>";
            document.getElementById('reg-premio').innerText = "HAI VINTO: " + params.get('pr');
            document.getElementById('box-prenota').style.display = 'block';
        } else {
            document.getElementById('reg-premio').innerText = "PROSSIMO OBIETTIVO: " + params.get('pr');
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 160, height: 160 });
        }
    }

    function condividiLink() {
        const text = `Guarda! Sto raccogliendo punti da ${document.getElementById('reg-studio').innerText}. Clicca qui: ${window.location.href}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function prenotaOra() {
        const p = new URLSearchParams(window.location.search);
        window.open(`https://wa.me/${p.get('wa')}?text=${encodeURIComponent("Ciao! Ho completato i 5 punti e vorrei il premio: " + p.get('pr'))}`);
    }

    function chiediPro() {
        fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({tipo:'RICHIESTA_PRO', deviceId, nomeAtt: config.n, wa: config.w}) });
        window.open(`https://wa.me/393471234567?text=Vorrei attivare PRO per ${config.n}`);
        alert("Richiesta inviata!");
    }

    function confermaReset() { if(config && confirm("Uscire?")) { localStorage.removeItem('spich_cfg'); location.reload(); } }
    
    function checkPremioCustom() {
        const c = document.getElementById('new-custom');
        if(document.getElementById('new-premio').value === 'CUSTOM') c.style.display = 'block';
        else c.style.display = 'none';
    }
</script>
</body>
    </html>
